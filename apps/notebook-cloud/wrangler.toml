name = "nteract-notebook-cloud"
main = "./src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]
routes = [{ pattern = "preview.runt.run", custom_domain = true }]

[dev]
port = 8787

[[durable_objects.bindings]]
name = "NOTEBOOK_ROOMS"
class_name = "NotebookRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["NotebookRoom"]

[[d1_databases]]
binding = "DB"
database_name = "nteract-notebook-cloud-prototype-db"
database_id = "59decd97-a3d4-4442-abe7-50b465cb347e"

[[r2_buckets]]
binding = "NOTEBOOK_SNAPSHOTS"
bucket_name = "nteract-notebook-cloud-prototype"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true

[vars]
DEPLOYMENT_ENV = "prototype"
NOTEBOOK_CLOUD_ALLOWED_ORIGINS = "https://preview.runt.run"
NOTEBOOK_CLOUD_ANACONDA_API_KEY_PRINCIPAL_NAMESPACE = "user:anaconda"
NOTEBOOK_CLOUD_ANACONDA_API_KEY_USERINFO_URL = "https://anaconda.com/api/auth/sessions/whoami"
NOTEBOOK_CLOUD_OIDC_CLIENT_ID = "cec4781f-853c-4267-bf09-4bc59a2a3750"
NOTEBOOK_CLOUD_OIDC_AUDIENCE = "anaconda"
NOTEBOOK_CLOUD_OIDC_ISSUER = "https://auth.stage.anaconda.com/api/auth"
NOTEBOOK_CLOUD_OIDC_PRINCIPAL_NAMESPACE = "user:anaconda"
NOTEBOOK_CLOUD_OIDC_REDIRECT_URI = "https://preview.runt.run/oidc"
RENDERER_ASSETS_BASE_URL = "https://nteract-notebook-cloud-assets.rgbkrk.workers.dev/renderer-assets/"
RUNTIMED_WASM_BASE_URL = "https://nteract-notebook-cloud-assets.rgbkrk.workers.dev/renderer-assets/"
OUTPUT_DOCUMENT_BASE_URL = "https://preview.runtusercontent.com/frame/"
