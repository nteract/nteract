packages:
  - apps/*
  - packages/*
  - packages/runtimed-node/npm/*
  - plugins/nteract/*

onlyBuiltDependencies:
  - '@fortawesome/fontawesome-free'
  - esbuild
minimumReleaseAge: 1440
# Temporary for bootstrapping the current Fumadocs scaffold against freshly
# published pinned versions; remove once these exact lockfile entries age in.
minimumReleaseAgeExclude:
  - fumadocs-core
  - fumadocs-mdx
  - fumadocs-ui
blockExoticSubdeps: true
trustPolicy: no-downgrade
# Temporary transitive exception from the current Fumadocs install; remove when
# the lockfile no longer needs this package version.
trustPolicyExclude:
  - tinyexec@1.2.2
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.1.16
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.16
  vite-plus: 0.1.16
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
  '@codemirror/language': 6.12.2
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
