[package]
name = "runtimed-py"
version = "2.6.1"
edition = "2021"
description = "Python bindings for runtimed daemon client"
repository.workspace = true
license.workspace = true
publish = false

[lib]
name = "_internals"
crate-type = ["cdylib"]

[features]
default = ["extension-module"]
extension-module = ["pyo3/extension-module"]

[dependencies]
pyo3 = { version = "0.28", features = ["abi3-py39"] }
pyo3-async-runtimes = { version = "0.28", features = ["tokio-runtime"] }
runtimed-client = { path = "../runtimed-client" }
runtimed-outputs = { path = "../runtimed-outputs" }
runtimed-settings-sync = { path = "../runtimed-settings-sync" }
notebook-doc = { path = "../notebook-doc" }
runtime-doc = { path = "../runtime-doc" }
notebook-protocol = { path = "../notebook-protocol" }
kernel-env = { path = "../kernel-env" }
notebook-sync = { path = "../notebook-sync" }
tokio = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
log = { workspace = true }
runt-workspace = { path = "../runt-workspace" }

[lints]
workspace = true
