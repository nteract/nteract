[package]
name = "runtimed"
version = "2.5.2"
edition.workspace = true
description = "Central daemon for managing Jupyter runtimes and prewarmed environments"
repository.workspace = true
license.workspace = true

[lints]
workspace = true

[lib]
name = "runtimed"
path = "src/lib.rs"

[[bin]]
name = "runtimed"
path = "src/main.rs"

[dependencies]
runtimed-client = { path = "../runtimed-client" }
runtimed-outputs = { path = "../runtimed-outputs" }
runtimed-service = { path = "../runtimed-service" }
runtimed-settings-sync = { path = "../runtimed-settings-sync" }
nteract-telemetry = { path = "../nteract-telemetry" }
nteract-markdown-wasm = { path = "../nteract-markdown-wasm" }
notebook-protocol = { path = "../notebook-protocol" }
notebook-wire = { path = "../notebook-wire" }
notebook-cloud-transport = { path = "../notebook-cloud-transport" }
nteract-identity = { path = "../nteract-identity" }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
bytes = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
futures = { workspace = true }
loro_fractional_index = { workspace = true }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dirs = "6"
aho-corasick = "1"

# Jupyter kernel management
jupyter-protocol = { workspace = true }
nbformat = { workspace = true }
jupyter-zmq-client = { workspace = true, features = ["tokio-runtime", "aws-lc-rs"] }
petname = "2"
chrono = { version = "0.4", default-features = false, features = ["std", "clock", "serde"] }
clap = { version = "4", features = ["derive"] }

# Conda environment support via rattler
rattler = { version = "0.40", default-features = false, features = ["native-tls"] }
rattler_cache = { version = "0.6", default-features = false, features = ["native-tls"] }
rattler_conda_types = "0.44"
rattler_repodata_gateway = { version = "0.27", default-features = false, features = ["gateway", "native-tls"] }
rattler_solve = { version = "5.0", features = ["resolvo"] }
rattler_virtual_packages = "2.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "native-tls"] }
reqwest-middleware = "0.4"

# Content-addressed blob store
sha2 = "0.11"
hex = "0.4"

# Terminal emulation for stream outputs
alacritty_terminal = "0.25"

# Error parsing
regex = "1"
base64 = "0.22"

# Markdown parsing for image extraction
pulldown-cmark = "0.13"

# HTTP blob server
hyper = { version = "1", features = ["http1", "server"] }
http-body-util = "0.1"
hyper-util = { version = "0.1", features = ["tokio"] }
# ReaderStream lets the blob HTTP server stream from a tokio::fs::File handle
# instead of reading the whole blob into Vec<u8> per request. Punchlist BS-1.
tokio-util = { version = "0.7", features = ["io"] }

# Automerge CRDT for settings sync
automerge = { workspace = true }
automerge-recovery = { path = "../automerge-recovery" }

# Shared notebook document types (cell CRUD, metadata, sync)
notebook-doc = { path = "../notebook-doc", features = ["persistence"] }

# RuntimeStateHandle — typed handle for per-notebook RuntimeStateDoc
runtime-doc = { path = "../runtime-doc" }

# Trust verification (shared with notebook crate)
runt-trust = { path = "../runt-trust" }

# Workspace and dev mode utilities
runt-workspace = { path = "../runt-workspace" }

# Shared kernel launching and tool bootstrapping
kernel-launch = { path = "../kernel-launch" }

# Shared environment management (UV + Conda) with progress reporting
kernel-env = { path = "../kernel-env" }

# File watching for external settings.json changes
notify = { workspace = true }
notify-debouncer-mini = { workspace = true }

# Fast JSON parsing for notebook loading
jiter = { workspace = true }

# pyproject.toml parsing for ProjectContext (handles PEP 508 specs with
# commas inside bracket groups, which the prior line-scanner mangled).
toml = "1"
rusqlite = { version = "0.32", features = ["bundled"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
nix = { version = "0.31", features = ["signal", "process"] }

[build-dependencies]
build-metadata = { path = "../build-metadata" }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.52", features = ["Win32_Storage_FileSystem", "Win32_Foundation", "Win32_Security", "Win32_Security_Authorization", "Win32_System_JobObjects", "Win32_System_Threading"] }

[dev-dependencies]
tempfile = "3"
serial_test = "3"
tokio = { version = "1.36.0", features = ["full", "test-util"] }
notebook-sync = { path = "../notebook-sync" }
async-rust-lsp = "0.3"
zeromq = "0.6"
