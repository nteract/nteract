[package]
name = "runtimed-client"
version = "2.4.3"
edition.workspace = true
description = "Client library for communicating with the runtimed daemon"
repository.workspace = true
license.workspace = true

[lints]
workspace = true

[features]
# Enable ts-rs TypeScript binding generation. Off by default — only needed
# when regenerating src/bindings/ via `cargo test`. Pulls in dprint/SWC/deno_ast
# (~159 transitive crates).
ts-bindings = ["dep:ts-rs"]

[dependencies]
notebook-protocol = { path = "../notebook-protocol" }
notebook-doc = { path = "../notebook-doc" }
runtime-doc = { path = "../runtime-doc" }
runt-workspace = { path = "../runt-workspace" }
repr-llm = { path = "../repr-llm" }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
chrono = { version = "0.4", default-features = false, features = ["std", "clock", "serde"] }
log = "0.4"
dirs = "6"
base64 = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["native-tls"] }
uuid = { workspace = true }
automerge = { workspace = true }
schemars = { workspace = true }
ts-rs = { workspace = true, optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
smappservice-rs = "0.1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tempfile = "3"

[build-dependencies]
build-metadata = { path = "../build-metadata" }
