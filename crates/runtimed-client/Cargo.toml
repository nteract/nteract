[package]
name = "runtimed-client"
version = "2.6.1"
edition.workspace = true
description = "Client library for communicating with the runtimed daemon"
repository.workspace = true
license.workspace = true

[lints]
workspace = true

[features]
# Enable ts-rs TypeScript binding generation. Off by default — only needed
# when regenerating src/bindings/ via `cargo test`. Pulls in dprint/SWC/deno_ast
# (~159 transitive crates).
ts-bindings = ["dep:ts-rs"]

[dependencies]
notebook-protocol = { path = "../notebook-protocol" }
notebook-doc = { path = "../notebook-doc" }
runtime-doc = { path = "../runtime-doc" }
runt-workspace = { path = "../runt-workspace" }
tokio = { workspace = true, features = ["full"] }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true, features = ["std", "clock", "serde"] }
log = { workspace = true }
dirs = { workspace = true }
uuid = { workspace = true }
automerge = { workspace = true }
automerge-recovery = { path = "../automerge-recovery" }
schemars = { workspace = true }
ts-rs = { workspace = true, optional = true }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
serial_test = { workspace = true }

[build-dependencies]
build-metadata = { path = "../build-metadata" }
