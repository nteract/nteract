<!doctype html>
<html style="background: transparent; color-scheme: light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' blob: data:; script-src 'unsafe-inline' 'unsafe-eval' blob: https: http://127.0.0.1:*; style-src 'unsafe-inline' https: http://127.0.0.1:*; img-src * data: blob:; font-src * data:; media-src * data: blob:; object-src * data: blob:; connect-src *; worker-src 'self' blob:; frame-src 'none'; child-src 'none';"
    />
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var theme = params.get("nteract_theme");
          var colorTheme = params.get("nteract_color_theme");
          var isDark =
            theme === "dark" ||
            (theme !== "light" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var rootEl = document.documentElement;
          rootEl.classList.add(isDark ? "dark" : "light");
          rootEl.classList.remove(isDark ? "light" : "dark");
          rootEl.setAttribute("data-theme", isDark ? "dark" : "light");
          rootEl.style.colorScheme = isDark ? "dark" : "light";
          if (colorTheme && colorTheme !== "classic") {
            rootEl.setAttribute("data-color-theme", colorTheme);
          }
        } catch (_) {}
      })();
    </script>
    <style>
      :root {
        --bg-primary: transparent;
        --bg-secondary: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666666;
        --border-color: #e0e0e0;
        --accent-color: #3b82f6;
        --link-underline-color: color-mix(in oklch, var(--accent-color) 55%, transparent);
        --error-color: #ef4444;
        --success-color: #22c55e;
        --color-background-primary: var(--bg-primary);
        --color-background-secondary: var(--bg-secondary);
        --color-text-primary: var(--text-primary);
        --color-text-secondary: var(--text-secondary);
        --color-border-primary: var(--border-color);
        --color-ring-primary: var(--accent-color);
        --color-text-danger: var(--error-color);
        --color-text-success: var(--success-color);
        --font-sans: var(--output-ui-font);
        --font-mono: var(--output-mono-font);
        --output-ui-font:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --output-mono-font: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        --output-document-font: var(--output-ui-font);
      }

      .dark,
      [data-theme="dark"] {
        --bg-secondary: #1a1a1a;
        --text-primary: #e0e0e0;
        --text-secondary: #a0a0a0;
        --border-color: #333333;
        --accent-color: #60a5fa;
        --link-underline-color: color-mix(in oklch, var(--accent-color) 60%, transparent);
      }

      [data-color-theme="cream"] {
        --output-document-font: KaTeX_Main, Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: var(--output-ui-font);
        line-height: 1.5;
        background: transparent;
        color: var(--text-primary);
        /*
       * overflow-x hidden prevents stray horizontal scrollbars during render.
       * overflow-y must be auto so focused-mode iframes (clamped below content
       * height) get the user agent's native vertical scroll. In autoHeight
       * mode the iframe matches content height so the scrollbar never
       * appears in practice.
       */
        overflow-x: hidden;
        overflow-y: auto;
      }

      /* Output container */
      #root {
        min-height: 1px;
      }

      /* Reset common elements - 0.875rem matches Tailwind's text-sm */
      pre,
      code {
        font-family: var(--output-mono-font);
        font-size: 0.875rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) {
        font-family: var(--output-document-font);
        font-size: 1rem;
        line-height: 1.68;
        font-kerning: normal;
        text-rendering: optimizeLegibility;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) h1,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h2,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h3,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h4,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h5,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h6 {
        color: var(--text-primary);
        font-family: var(--output-document-font);
        font-weight: 600;
        line-height: 1.2;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) h1 {
        margin: 1.75rem 0 1rem;
        font-size: 2rem;
        line-height: 1.08;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) h2 {
        position: relative;
        margin: 1.75rem 0 0.75rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--border-color);
        font-size: 1.5rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) h2::after {
        position: absolute;
        bottom: -1px;
        left: 0;
        width: 4rem;
        height: 1px;
        background: color-mix(in oklch, var(--accent-color) 55%, transparent);
        content: "";
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) h1 > a[href^="#"],
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h2 > a[href^="#"],
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h3 > a[href^="#"],
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h4 > a[href^="#"],
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h5 > a[href^="#"],
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h6 > a[href^="#"] {
        display: inline-flex;
        margin-left: 0.5rem;
        transform: translateY(-0.08em);
        color: color-mix(in oklch, var(--text-secondary) 42%, transparent);
        font-family: var(--output-ui-font);
        font-size: 0.58em;
        font-weight: 500;
        text-decoration: none;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) h1 > a[href^="#"]:hover,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h2 > a[href^="#"]:hover,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h3 > a[href^="#"]:hover,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h4 > a[href^="#"]:hover,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h5 > a[href^="#"]:hover,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) h6 > a[href^="#"]:hover {
        color: var(--accent-color);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) h3 {
        margin: 1.5rem 0 0.625rem;
        font-size: 1.25rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) h4 {
        margin: 1rem 0 0.5rem;
        font-size: 1.125rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) h5 {
        margin: 0.875rem 0 0.4rem;
        font-size: 1rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) h6 {
        margin: 0.75rem 0 0.35rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--text-secondary);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) p {
        margin: 0.75rem 0;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) ul,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) ol {
        margin: 0.75rem 0;
        padding-left: 1.5rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) li {
        margin: 0.25rem 0;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) ul.contains-task-list,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) ol.contains-task-list {
        margin: 1rem 0;
        padding: 0.5rem;
        border: 1px solid color-mix(in oklch, var(--border-color) 76%, transparent);
        border-radius: 0.375rem;
        background: color-mix(in oklch, var(--bg-secondary) 30%, transparent);
        list-style: none;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) li.task-list-item {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 0.5rem;
        align-items: start;
        margin: 0.25rem 0;
        padding: 0.375rem 0.5rem;
        border-radius: 0.125rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) li.task-list-item:hover {
        background: color-mix(in oklch, var(--bg-secondary) 62%, transparent);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"])
        li.task-list-item
        > input[type="checkbox"] {
        width: 1rem;
        height: 1rem;
        margin: 0.18em 0 0;
        accent-color: var(--accent-color);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) blockquote {
        margin: 1.25rem 0;
        padding: 0.75rem 1rem 0.75rem 1.25rem;
        border-left: 3px solid color-mix(in oklch, var(--accent-color) 52%, transparent);
        background: color-mix(in oklch, var(--bg-secondary) 62%, transparent);
        color: var(--text-secondary);
        font-style: italic;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) hr {
        margin: 1.5rem 0;
        border: 0;
        border-top: 1px solid var(--border-color);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) pre,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) code {
        font-family: var(--output-mono-font);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) :not(pre) > code {
        padding: 0.125rem 0.375rem;
        border: 1px solid var(--border-color);
        border-radius: 0.125rem;
        background: color-mix(in oklch, var(--bg-secondary) 72%, transparent);
        color: var(--text-primary);
        font-size: 0.88em;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) strong {
        color: var(--text-primary);

      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) em {
        color: var(--text-secondary);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) del {
        color: var(--text-secondary);
        text-decoration-thickness: 2px;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) details {
        margin: 1.25rem 0;
        overflow: hidden;
        border: 1px solid color-mix(in oklch, var(--border-color) 85%, transparent);
        border-radius: 0.375rem;
        background: color-mix(in oklch, var(--bg-secondary) 32%, transparent);
        box-shadow: 0 1px 2px color-mix(in oklch, var(--text-primary) 10%, transparent);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) details[open] {
        background: color-mix(in oklch, var(--bg-secondary) 40%, transparent);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) summary {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid transparent;
        color: var(--text-primary);
        cursor: pointer;
        font-family: var(--output-ui-font);
        font-size: 0.875rem;
        font-weight: 600;
        line-height: 1.25rem;
        list-style: none;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) details[open] > summary {
        border-bottom-color: color-mix(in oklch, var(--border-color) 70%, transparent);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"])
        summary::-webkit-details-marker {
        display: none;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) summary::before {
        display: inline-flex;
        width: 1.25rem;
        height: 1.25rem;
        flex: none;
        align-items: center;
        justify-content: center;
        border: 1px solid color-mix(in oklch, var(--accent-color) 28%, transparent);
        border-radius: 999px;
        background: color-mix(in oklch, var(--accent-color) 8%, transparent);
        color: var(--accent-color);
        content: "›";
        font-family: var(--output-ui-font);
        font-size: 0.75rem;
        line-height: 1;
        transition: transform 120ms ease;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"])
        details[open]
        > summary::before {
        transform: rotate(90deg);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) details > :not(summary) {
        margin-right: 1rem;
        margin-left: 1rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) details > summary + * {
        margin-top: 0.75rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) details > :last-child {
        margin-bottom: 1rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) table,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) button,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) input,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) select,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) textarea,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) svg,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) canvas {
        font-family: var(--output-ui-font);
        line-height: 1.5;
      }

      pre {
        margin: 0;
        padding: 8px;
        background: var(--bg-secondary);
        border-radius: 4px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      /* Table styling for pandas DataFrames - 0.875rem matches Tailwind's text-sm */
      table {
        border-collapse: collapse;
        margin: 8px 0;
        font-size: 0.875rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) table {
        margin: 1.25rem 0;
        border: 1px solid var(--border-color);
        border-radius: 0.125rem;
        background: var(--bg-primary);
        box-shadow: 0 1px 2px color-mix(in oklch, var(--text-primary) 10%, transparent);
        overflow: hidden;
      }

      th,
      td {
        border: 1px solid var(--border-color);
        padding: 4px 8px;
        text-align: left;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) th,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) td {
        padding: 0.625rem 0.75rem;
      }

      th {
        background: var(--bg-secondary);
        font-weight: 600;
      }

      /* Image outputs */
      img {
        max-width: 100%;
        height: auto;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) img {
        margin: 1.25rem 0;
        border: 1px solid var(--border-color);
        border-radius: 0.125rem;
        background: color-mix(in oklch, var(--bg-secondary) 38%, transparent);
        box-shadow: 0 1px 2px color-mix(in oklch, var(--text-primary) 10%, transparent);
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) figure {
        margin: 1.25rem 0;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) figure > img {
        margin-bottom: 0;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) figcaption {
        margin-top: 0.5rem;
        color: var(--text-secondary);
        font-family: var(--output-ui-font);
        font-size: 0.75rem;
        line-height: 1.25rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) section[data-footnotes] {
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border-color);
        color: var(--text-secondary);
        font-family: var(--output-ui-font);
        font-size: 0.875rem;
        line-height: 1.5rem;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) a[data-footnote-ref],
      :is([data-slot="markdown-output"], [data-slot="html-output"]) a.data-footnote-ref {
        display: inline-flex;
        min-width: 1rem;
        justify-content: center;
        margin: 0 0.125rem;
        padding: 0 0.25rem;
        transform: translateY(-0.22em);
        border: 1px solid color-mix(in oklch, var(--accent-color) 24%, transparent);
        border-radius: 999px;
        background: color-mix(in oklch, var(--accent-color) 8%, transparent);
        color: var(--accent-color);
        font-family: var(--output-ui-font);
        font-size: 0.68em;
        line-height: 1rem;
        text-decoration: none;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) a[data-footnote-ref]:hover,
      :is([data-slot="markdown-output"], [data-slot="html-output"]) a.data-footnote-ref:hover {
        background: color-mix(in oklch, var(--accent-color) 12%, transparent);
        text-decoration: none;
      }

      :is([data-slot="markdown-output"], [data-slot="html-output"]) .katex-display {
        margin: 1.25rem 0;
        padding: 1rem;
        overflow-x: auto;
        border-top: 1px solid var(--border-color);
        border-bottom: 1px solid var(--border-color);
        border-radius: 0.125rem;
        background: color-mix(in oklch, var(--bg-secondary) 46%, transparent);
        text-align: center;
      }

      /* Links */
      a {
        color: var(--accent-color);
        font-weight: 500;
        text-decoration-line: underline;
        text-decoration-color: var(--link-underline-color);
        text-decoration-thickness: 1px;
        text-underline-offset: 0.22em;
      }

      a:hover {
        text-decoration-color: currentColor;
      }

      /* Error styling */
      .error {
        color: var(--error-color);
      }

      .error pre {
        background: #1a1010;
        color: var(--error-color);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        "use strict";

        // --- State ---
        let isReady = false;
        const root = document.getElementById("root");
        let hostFontStyle = null;
        const IFRAME_HEIGHT_FUDGE_PX = 2;

        function setFrameTheme(isDark, colorTheme, cssVariables) {
          const rootEl = document.documentElement;

          // Apply color theme attribute first so CSS var computation can read it
          if (colorTheme) {
            rootEl.setAttribute("data-color-theme", colorTheme);
          } else if (colorTheme === null || colorTheme === "") {
            rootEl.removeAttribute("data-color-theme");
          }

          if (isDark !== undefined) {
            // Set class for Tailwind dark: variant and CSS selectors
            if (isDark) {
              rootEl.classList.add("dark");
              rootEl.classList.remove("light");
            } else {
              rootEl.classList.add("light");
              rootEl.classList.remove("dark");
            }
            // Set data-theme for components that check this attribute
            rootEl.setAttribute("data-theme", isDark ? "dark" : "light");
            // Set color-scheme for prefers-color-scheme media queries
            rootEl.style.colorScheme = isDark ? "dark" : "light";
            // Set CSS variables — cream uses warm tones matching Sift's palette
            var ct = rootEl.getAttribute("data-color-theme");
            var isCream = ct === "cream";
            rootEl.style.setProperty("--bg-primary", "transparent");
            rootEl.style.setProperty(
              "--bg-secondary",
              isCream ? (isDark ? "#242120" : "#f0ede7") : isDark ? "#1a1a1a" : "#f5f5f5",
            );
            rootEl.style.setProperty(
              "--text-primary",
              isCream ? (isDark ? "#e8e2dc" : "#1e1a18") : isDark ? "#e0e0e0" : "#1a1a1a",
            );
            rootEl.style.setProperty(
              "--text-secondary",
              isCream ? (isDark ? "#9a918a" : "#6e655f") : isDark ? "#a0a0a0" : "#666666",
            );
            rootEl.style.setProperty(
              "--border-color",
              isCream ? (isDark ? "#3a3533" : "#d8cec3") : isDark ? "#333333" : "#e0e0e0",
            );
          }

          if (cssVariables) {
            Object.entries(cssVariables).forEach(function ([key, value]) {
              rootEl.style.setProperty(key, value);
            });
          }
        }

        function applyInitialThemeHint() {
          try {
            var themeHint = new URL(window.location.href).searchParams.get("nteract_theme");
            if (themeHint === "light" || themeHint === "dark") {
              setFrameTheme(themeHint === "dark");
            }
          } catch (_error) {
            // srcDoc and custom-scheme frames may not have a parseable URL.
          }
        }

        applyInitialThemeHint();

        function measureDocumentHeight() {
          var doc = document.documentElement;
          var body = document.body;
          var rootRectBottom = root ? root.getBoundingClientRect().bottom : 0;
          return (
            Math.ceil(
              Math.max(
                body ? body.scrollHeight : 0,
                body ? body.offsetHeight : 0,
                doc ? doc.scrollHeight : 0,
                doc ? doc.offsetHeight : 0,
                rootRectBottom,
              ),
            ) + IFRAME_HEIGHT_FUDGE_PX
          );
        }

        var wheelBoundaryForwardingEnabled = false;

        // --- Message Handler ---
        // Note: When the React renderer bundle is loaded, it sets window.__REACT_RENDERER_ACTIVE__
        // and the inline handlers should defer to React for render/theme/clear messages.
        window.addEventListener("message", function (event) {
          // Only accept messages from our parent window
          if (event.source !== window.parent) {
            return;
          }

          var data = event.data;
          if (!data || typeof data !== "object") return;

          // Handle JSON-RPC 2.0 messages
          if (data.jsonrpc === "2.0") {
            var method = data.method;
            var params = data.params || {};
            try {
              switch (method) {
                case "nteract/eval":
                  handleEval(params);
                  break;
                case "nteract/renderOutput":
                  if (window.__REACT_RENDERER_ACTIVE__) return;
                  handleRender(params);
                  break;
                case "nteract/theme":
                  if (window.__REACT_RENDERER_ACTIVE__) return;
                  handleTheme(params);
                  break;
                case "ui/notifications/host-context-changed":
                  if (window.__REACT_RENDERER_ACTIVE__) return;
                  handleHostContext(params);
                  break;
                case "nteract/clearOutputs":
                  if (window.__REACT_RENDERER_ACTIVE__) return;
                  handleClear();
                  break;
                case "nteract/ping":
                  handlePing(params);
                  break;
                case "nteract/search":
                  handleSearch(params);
                  break;
                case "nteract/searchNavigate":
                  handleSearchNavigate(params);
                  break;
                case "nteract/widgetState":
                  handleWidgetState(params);
                  break;
                // Comm bridge messages — handled by widget-bridge-client.ts via transport
                case "nteract/bridgeReady":
                case "nteract/commOpen":
                case "nteract/commMsg":
                case "nteract/commClose":
                case "nteract/widgetSnapshot":
                  break;
              }
            } catch (err) {
              sendError(err);
            }
            return;
          }

          // Legacy { type, payload } format (fallback)
          var type = data.type;
          var payload = data.payload;

          try {
            switch (type) {
              case "ping":
                handlePing(payload);
                break;

              case "eval":
                handleEval(payload);
                break;

              case "render":
                if (window.__REACT_RENDERER_ACTIVE__) return;
                handleRender(payload);
                break;

              case "theme":
                if (window.__REACT_RENDERER_ACTIVE__) return;
                handleTheme(payload);
                break;

              case "host_context":
                if (window.__REACT_RENDERER_ACTIVE__) return;
                handleHostContext(payload);
                break;

              case "clear":
                if (window.__REACT_RENDERER_ACTIVE__) return;
                handleClear();
                break;

              case "widget_state":
                handleWidgetState(payload);
                break;

              case "search":
                handleSearch(payload);
                break;

              case "search_navigate":
                handleSearchNavigate(payload);
                break;

              case "wheel_boundary_policy":
                wheelBoundaryForwardingEnabled = !!(payload && payload.enabled);
                break;

              case "bridge_ready":
              case "comm_open":
              case "comm_msg":
              case "comm_close":
              case "widget_snapshot":
                break;
            }
          } catch (err) {
            sendError(err);
          }
        });

        // --- Message Handlers ---

        function handlePing(payload) {
          sendRpc("nteract/pong", {
            receivedAt: Date.now(),
            echo: payload,
          });
        }

        function handleEval(payload) {
          const { code } = payload || {};
          if (!code) {
            sendRpc("nteract/evalResult", { success: false, error: "No code provided" });
            return;
          }

          // Store the current message for access during eval
          window.currentMessage = event;
          try {
            const result = eval.call(null, code);
            sendRpc("nteract/evalResult", { success: true, result: String(result ?? "undefined") });
          } catch (err) {
            sendRpc("nteract/evalResult", { success: false, error: err.message });
          } finally {
            delete window.currentMessage;
          }
        }

        function handleRender(payload) {
          const { mimeType, data, metadata, append } = payload || {};

          // Create output container
          const output = document.createElement("div");
          output.className = "output-item";
          output.style.marginBottom = "8px";

          if (mimeType === "text/html") {
            // Use createContextualFragment for proper script execution
            const range = document.createRange();
            const fragment = range.createContextualFragment(String(data));
            output.appendChild(fragment);
          } else if (mimeType === "text/plain") {
            const pre = document.createElement("pre");
            pre.textContent = String(data);
            output.appendChild(pre);
          } else if (mimeType === "image/svg+xml") {
            // SVG: render inline
            const container = document.createElement("div");
            container.innerHTML = String(data);
            const svg = container.querySelector("svg");
            if (svg) {
              svg.style.maxWidth = "100%";
              svg.style.height = "auto";
              output.appendChild(svg);
            } else {
              output.appendChild(container);
            }
          } else if (mimeType && mimeType.startsWith("image/")) {
            const img = document.createElement("img");
            const imgData = String(data);
            // Check if it's base64 or a URL
            if (imgData.startsWith("data:") || imgData.startsWith("http")) {
              img.src = imgData;
            } else {
              img.src = "data:" + mimeType + ";base64," + imgData;
            }
            if (metadata?.width) img.width = metadata.width;
            if (metadata?.height) img.height = metadata.height;
            output.appendChild(img);
          } else if (mimeType === "application/json") {
            // JSON: render as formatted, collapsible tree
            const pre = document.createElement("pre");
            try {
              const parsed = typeof data === "string" ? JSON.parse(data) : data;
              pre.textContent = JSON.stringify(parsed, null, 2);
            } catch (e) {
              pre.textContent = String(data);
            }
            output.appendChild(pre);
          } else {
            // Fallback: render as text
            const pre = document.createElement("pre");
            pre.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
            output.appendChild(pre);
          }

          // Append or replace
          if (append) {
            root.appendChild(output);
          } else {
            root.innerHTML = "";
            root.appendChild(output);
          }

          // Notify completion
          requestAnimationFrame(function () {
            var height = measureDocumentHeight();
            sendRpc("nteract/renderComplete", { height: height });
            sendSizeChanged(height);
          });
        }

        function handleTheme(payload) {
          const { isDark, colorTheme, cssVariables } = payload || {};
          setFrameTheme(isDark, colorTheme, cssVariables);
        }

        function handleHostContext(payload) {
          var context = payload || {};
          var theme = context.theme;
          var colorTheme = context.nteract && context.nteract.colorTheme;
          if (theme === "light" || theme === "dark" || colorTheme !== undefined) {
            handleTheme({
              isDark: theme === "dark" ? true : theme === "light" ? false : undefined,
              colorTheme: colorTheme === undefined ? undefined : colorTheme,
            });
          }

          var variables = context.styles && context.styles.variables;
          if (variables) {
            Object.entries(variables).forEach(function ([key, value]) {
              if (typeof value === "string") {
                document.documentElement.style.setProperty(key, value);
              }
            });
          }

          var fonts = context.styles && context.styles.css && context.styles.css.fonts;
          // Keep font-style handling in sync with src/isolated-renderer/index.tsx
          // for the React renderer path.
          if (typeof fonts === "string" && fonts.length > 0) {
            if (!hostFontStyle) {
              hostFontStyle = document.createElement("style");
              hostFontStyle.setAttribute("data-nteract-host-fonts", "true");
              document.head.appendChild(hostFontStyle);
            }
            hostFontStyle.textContent = fonts;
          } else if (fonts === "" && hostFontStyle) {
            hostFontStyle.remove();
            hostFontStyle = null;
          }

          var dimensions = context.containerDimensions || {};
          if (dimensions.width) {
            document.documentElement.style.setProperty(
              "--nteract-host-width",
              dimensions.width + "px",
            );
          }
          if (dimensions.maxWidth) {
            document.documentElement.style.setProperty(
              "--nteract-host-max-width",
              dimensions.maxWidth + "px",
            );
          }
          if (dimensions.height) {
            document.documentElement.style.setProperty(
              "--nteract-host-height",
              dimensions.height + "px",
            );
          }
          if (dimensions.maxHeight) {
            document.documentElement.style.setProperty(
              "--nteract-host-max-height",
              dimensions.maxHeight + "px",
            );
          }

          // Renderer bundles may size themselves from host-context CSS variables.
          // Parent-side height and width guards are load-bearing: this resize
          // must not create an unbounded host-context <-> size-changed loop.
          window.dispatchEvent(new Event("resize"));
        }

        function handleClear() {
          root.innerHTML = "";
          var height = measureDocumentHeight();
          sendRpc("nteract/renderComplete", { height: height });
          sendSizeChanged(height);
        }

        function handleWidgetState(payload) {
          // Widget state updates are handled by the injected renderer bundle
          // This is a placeholder that fires a custom event
          window.dispatchEvent(new CustomEvent("widget_state", { detail: payload }));
        }

        // --- Search ---
        var searchMarks = [];
        var currentSearchIndex = -1;

        function handleSearch(payload) {
          var query = (payload && payload.query) || "";
          var caseSensitive = payload && payload.caseSensitive;
          clearSearchMarks();
          if (!query) {
            sendRpc("nteract/searchResults", { count: 0 });
            return;
          }
          var marks = [];
          var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
          var node;
          var compareQuery = caseSensitive ? query : query.toLowerCase();
          // Collect all text nodes and their match positions
          var matches = [];
          while ((node = walker.nextNode())) {
            var text = node.nodeValue || "";
            var compareText = caseSensitive ? text : text.toLowerCase();
            var pos = 0;
            while ((pos = compareText.indexOf(compareQuery, pos)) !== -1) {
              matches.push({ node: node, offset: pos, length: query.length });
              pos += query.length;
            }
          }
          // Highlight matches in reverse order to preserve offsets
          for (var i = matches.length - 1; i >= 0; i--) {
            var m = matches[i];
            try {
              var range = document.createRange();
              range.setStart(m.node, m.offset);
              range.setEnd(m.node, m.offset + m.length);
              var mark = document.createElement("mark");
              mark.className = "global-find-match";
              mark.style.cssText =
                "background: #fbbf24; color: #000; border-radius: 2px; padding: 0;";
              range.surroundContents(mark);
              marks.unshift(mark);
            } catch (e) {
              // surroundContents can fail if range crosses element boundaries
            }
          }
          searchMarks = marks;
          currentSearchIndex = -1;
          sendRpc("nteract/searchResults", { count: marks.length });
        }

        function handleSearchNavigate(payload) {
          var matchIndex = (payload && payload.matchIndex) || 0;
          if (searchMarks.length === 0) return;
          // Clear previous active highlight
          if (currentSearchIndex >= 0 && currentSearchIndex < searchMarks.length) {
            searchMarks[currentSearchIndex].style.cssText =
              "background: #fbbf24; color: #000; border-radius: 2px; padding: 0;";
          }
          currentSearchIndex = matchIndex;
          if (currentSearchIndex >= 0 && currentSearchIndex < searchMarks.length) {
            var active = searchMarks[currentSearchIndex];
            active.style.cssText =
              "background: #f97316; color: #000; border-radius: 2px; padding: 0;";
            active.scrollIntoView({ block: "nearest", behavior: "smooth" });
          }
        }

        function clearSearchMarks() {
          for (var i = 0; i < searchMarks.length; i++) {
            var mark = searchMarks[i];
            var parent = mark.parentNode;
            if (parent) {
              while (mark.firstChild) {
                parent.insertBefore(mark.firstChild, mark);
              }
              parent.removeChild(mark);
              parent.normalize();
            }
          }
          searchMarks = [];
          currentSearchIndex = -1;
        }

        // --- Utilities ---

        // Legacy format — only used for the bootstrap 'ready' signal
        // (host creates the transport in response, so JSON-RPC isn't available yet)
        function sendLegacy(type, payload) {
          window.parent.postMessage({ type: type, payload: payload }, "*");
        }

        // JSON-RPC 2.0 format — used for all other outgoing messages
        function sendRpc(method, params) {
          window.parent.postMessage({ jsonrpc: "2.0", method: method, params: params || {} }, "*");
        }

        function sendSizeChanged(height) {
          sendRpc("ui/notifications/size-changed", {
            width: Math.ceil(
              document.documentElement.scrollWidth || document.body.scrollWidth || 0,
            ),
            height: height,
          });
        }

        function sendError(err) {
          sendRpc("nteract/error", {
            message: err.message || String(err),
            stack: err.stack,
          });
        }

        // --- Resize Observer ---
        // Gate with __REACT_RENDERER_ACTIVE__ so the bootstrap observer
        // stops firing once the React renderer creates its own observer.
        // Use rAF to collapse multiple resize callbacks per frame into one
        // postMessage (avoids "ResizeObserver loop completed with undelivered
        // notifications" errors when many iframes resize simultaneously).
        var resizeRafPending = false;
        var resizeObserver = new ResizeObserver(function (entries) {
          if (window.__REACT_RENDERER_ACTIVE__) return;
          if (resizeRafPending) return;
          resizeRafPending = true;
          requestAnimationFrame(function () {
            resizeRafPending = false;
            if (window.__REACT_RENDERER_ACTIVE__) return;
            var height = measureDocumentHeight();
            sendRpc("nteract/resize", { height: height });
            sendSizeChanged(height);
          });
        });
        resizeObserver.observe(document.body);

        // --- Link Click Interception ---
        document.addEventListener(
          "click",
          function (e) {
            var target =
              e.target && e.target.nodeType === Node.ELEMENT_NODE
                ? e.target
                : e.target && e.target.parentElement;
            var link = target && target.closest ? target.closest("a") : null;
            if (link && link.href) {
              e.preventDefault();
              sendRpc("nteract/linkClick", {
                url: link.href,
                newTab: e.metaKey || e.ctrlKey,
              });
            }
          },
          { capture: true },
        );

        // --- Mouse Down Forwarding ---
        // Notify parent that the iframe received a click so it can
        // update cell focus. Does NOT preventDefault — all iframe
        // interactions (text selection, links, widgets) continue to work.
        document.addEventListener("mousedown", function () {
          sendRpc("nteract/mouseDown", {});
        });

        document.addEventListener("mouseup", function () {
          var selection = window.getSelection();
          sendRpc("nteract/mouseUp", {
            hasSelection: !!selection && !selection.isCollapsed && selection.toString().length > 0,
          });
        });

        // --- Wheel Boundary Forwarding ---
        // Native scroll chaining stops at the iframe boundary. When a scrollable
        // renderer is already at its vertical edge, ask the host to apply the
        // wheel delta to the notebook scroll container.
        function wheelTargetElement(target) {
          if (!target) return null;
          if (target.nodeType === Node.ELEMENT_NODE) return target;
          return target.parentElement || null;
        }

        function hasScrollableOverflowY(element) {
          var overflowY = window.getComputedStyle(element).overflowY;
          return overflowY === "auto" || overflowY === "scroll" || overflowY === "overlay";
        }

        function canScrollVertically(element) {
          return hasScrollableOverflowY(element) && element.scrollHeight > element.clientHeight + 1;
        }

        function nearestVerticalScroller(target) {
          var element = wheelTargetElement(target);
          while (element && element !== document.documentElement && element !== document.body) {
            if (canScrollVertically(element)) return element;
            element = element.parentElement;
          }
          // No explicitly-scrollable inner element. Fall back to the iframe
          // document root when its content overflows the iframe viewport. The
          // root has overflow:visible by default but the user agent treats it
          // as the scroll container for the iframe — without this the custom
          // wheel handler eats every event in a passthrough-mime output that
          // is constrained to less than its content height (focused mode).
          var root = document.scrollingElement || document.documentElement;
          if (root && root.scrollHeight > root.clientHeight + 1) return root;
          return null;
        }

        function isWheelAtScrollBoundary(scroller, deltaY) {
          if (!scroller) return true;
          if (deltaY < 0) return scroller.scrollTop <= 0;
          if (deltaY > 0) {
            return scroller.scrollTop + scroller.clientHeight >= scroller.scrollHeight - 1;
          }
          return false;
        }

        // Honor the inner scroller's `overscroll-behavior-y`. Renderers that
        // set `none` or `contain` are explicitly asking not to chain vertical
        // scroll to the host. The host can also decline wheel-boundary
        // forwarding for engaged frames that should lock scroll in place.
        function scrollerOptsOutOfChaining(scroller) {
          if (!scroller) return false;
          var behavior = window.getComputedStyle(scroller).overscrollBehaviorY;
          return behavior === "none" || behavior === "contain";
        }

        var pendingWheelBoundary = null;
        var pendingWheelBoundaryFrame = 0;

        function flushWheelBoundary() {
          pendingWheelBoundaryFrame = 0;
          var params = pendingWheelBoundary;
          pendingWheelBoundary = null;
          if (!params || !params.deltaY) return;
          sendRpc("nteract/wheelBoundary", params);
        }

        function queueWheelBoundary(deltaY, deltaMode) {
          if (!pendingWheelBoundary || pendingWheelBoundary.deltaMode !== deltaMode) {
            pendingWheelBoundary = { deltaY: deltaY, deltaMode: deltaMode };
          } else {
            pendingWheelBoundary.deltaY += deltaY;
          }

          if (!pendingWheelBoundaryFrame) {
            pendingWheelBoundaryFrame = requestAnimationFrame(flushWheelBoundary);
          }
        }

        document.addEventListener(
          "wheel",
          function (e) {
            if (!wheelBoundaryForwardingEnabled) return;
            if (!e.deltaY) return;
            var scroller = nearestVerticalScroller(e.target);
            if (!isWheelAtScrollBoundary(scroller, e.deltaY)) return;
            if (scrollerOptsOutOfChaining(scroller)) {
              // Let the native overscroll-behavior take over: the wheel
              // event runs but stops at the scroller's boundary instead
              // of chaining to the parent page.
              return;
            }
            e.preventDefault();
            queueWheelBoundary(e.deltaY, e.deltaMode);
          },
          { capture: true, passive: false },
        );

        // --- Double Click Forwarding ---
        document.addEventListener(
          "dblclick",
          function (e) {
            // Don't forward double-clicks on links (user is selecting text).
            // Capture phase keeps markdown renderers from swallowing the edit
            // affordance after the iframe has taken pointer ownership.
            var target =
              e.target && e.target.nodeType === Node.ELEMENT_NODE
                ? e.target
                : e.target && e.target.parentElement;
            var link = target && target.closest ? target.closest("a") : null;
            if (!link) {
              sendRpc("nteract/doubleClick", {});
            }
          },
          { capture: true },
        );

        // --- Clear selection on blur ---
        // When focus leaves this iframe (user clicked elsewhere), clear
        // any text selection so it doesn't visually persist.
        window.addEventListener("blur", function () {
          var sel = window.getSelection();
          if (sel) sel.removeAllRanges();
        });

        // --- Error Handler ---
        window.addEventListener("error", function (e) {
          sendError(e.error || new Error(e.message));
        });

        window.addEventListener("unhandledrejection", function (e) {
          sendError(e.reason || new Error("Unhandled promise rejection"));
        });

        // --- Ready Signal ---
        isReady = true;
        sendLegacy("ready", null);
      })();
    </script>
  </body>
</html>
