name: Build runtime artifacts
description: >-
  Build the wasm + renderer-plugin assets that `cargo build -p runtimed`
  embeds via include_bytes!. These outputs are gitignored; CI rebuilds
  them on every workflow run.

  Idempotent: pnpm install / wasm-pack install / cargo xtask wasm tolerate
  a re-run. Caller is responsible for setting up Rust toolchain + rust-cache
  before invoking; this action only adds Node, pnpm, wasm-pack, and runs the
  build.

  Pass skip-wasm: true when pre-built WASM artifacts have already been
  downloaded from an earlier job (the build-wasm pattern). Node/pnpm setup
  still runs so downstream steps like `pnpm build` work.

inputs:
  wasm-pack-version:
    description: wasm-pack version to install (must support --profile)
    required: false
    default: "0.14.0"
  node-version:
    description: Node.js version
    required: false
    default: "22"
  skip-wasm:
    description: >-
      Skip WASM + renderer-plugin builds. Use when pre-built artifacts
      have been downloaded from a build-wasm job.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: voidzero-dev/setup-vp@v1
      with:
        run-install: false

    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: pnpm install
      shell: bash
      run: pnpm install

    - name: Install wasm-pack
      # Build from crates.io rather than via a binary action so we don't
      # break on transient release-asset 404s; the caller's Swatinem
      # rust-cache covers ~/.cargo/bin between runs.
      if: inputs.skip-wasm != 'true'
      shell: bash
      run: cargo install --locked --version ${{ inputs.wasm-pack-version }} wasm-pack

    # Apple's system clang can't target wasm32-unknown-unknown.
    # Prepend Homebrew LLVM to PATH so cc-rs finds a wasm-capable clang.
    # Pin llvm@18 to match what macos-latest runners have pre-cached.
    - name: Ensure wasm-capable clang (macOS)
      if: inputs.skip-wasm != 'true' && runner.os == 'macOS'
      shell: bash
      run: |
        LLVM_BIN="$(brew --prefix llvm@18)/bin"
        if [ ! -d "$LLVM_BIN" ]; then
          brew install llvm@18
          LLVM_BIN="$(brew --prefix llvm@18)/bin"
        fi
        echo "$LLVM_BIN" >> "$GITHUB_PATH"

    # Windows runners may not have clang on PATH.
    - name: Ensure wasm-capable clang (Windows)
      if: inputs.skip-wasm != 'true' && runner.os == 'Windows'
      shell: bash
      run: |
        if ! command -v clang >/dev/null 2>&1; then
          choco install llvm --no-progress -y
        fi
        echo "C:\\Program Files\\LLVM\\bin" >> "$GITHUB_PATH"

    - name: Build wasm + renderer plugins
      if: inputs.skip-wasm != 'true'
      shell: bash
      run: cargo xtask wasm
