name: Build runtime artifacts
description: >-
  Build the wasm + renderer-plugin assets that `cargo build -p runtimed`
  embeds via include_bytes!. These outputs are gitignored; CI rebuilds
  them on every workflow run.

  Idempotent: pnpm install --frozen-lockfile / wasm-pack install / cargo xtask wasm tolerate
  a re-run. Caller is responsible for setting up Rust toolchain + rust-cache
  before invoking; this action only adds Node, pnpm, wasm-pack, and runs the
  build.

  Pass skip-wasm: true when pre-built WASM artifacts have already been
  downloaded from an earlier job (the build-wasm pattern). The downloaded
  bundle must include the generated outputs and target/xtask/*.fingerprint
  files from the build job. Node/pnpm setup still runs so downstream steps
  like `pnpm build` work.

inputs:
  wasm-pack-version:
    description: wasm-pack version to install (must support --profile)
    required: false
    default: "0.15.0"
  node-version:
    description: Node.js version
    required: false
    default: "22"
  skip-wasm:
    description: >-
      Skip WASM + renderer-plugin builds. Use when pre-built artifacts
      have been downloaded from a build-wasm job.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: ./.github/actions/setup-vp
      with:
        run-install: false

    - uses: pnpm/action-setup@v6
      with:
        dest: ${{ runner.temp }}/setup-pnpm

    # setup-node's pnpm cache post step can fail Windows jobs after artifacts upload
    # while saving cache.tzst, which turns an otherwise successful release red.
    - name: Set up Node with pnpm cache
      if: runner.os != 'Windows'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Set up Node
      if: runner.os == 'Windows'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: pnpm install
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Pin Rust tool paths
      shell: bash
      run: |
        echo "CARGO=$(rustup which cargo)" >> "$GITHUB_ENV"
        echo "RUSTC=$(rustup which rustc)" >> "$GITHUB_ENV"

    - name: Verify downloaded wasm artifacts
      if: inputs.skip-wasm == 'true'
      shell: bash
      run: cargo xtask artifacts verify runtime sift renderer

    - name: Install wasm-pack
      if: inputs.skip-wasm != 'true'
      uses: ./.github/actions/install-wasm-pack
      with:
        version: ${{ inputs.wasm-pack-version }}

    # Apple's system clang can't target wasm32-unknown-unknown.
    # Prepend Homebrew LLVM to PATH so cc-rs finds a wasm-capable clang.
    # Pin llvm@18 to match what macos-latest runners have pre-cached.
    - name: Ensure wasm-capable clang (macOS)
      if: inputs.skip-wasm != 'true' && runner.os == 'macOS'
      shell: bash
      run: |
        LLVM_BIN="$(brew --prefix llvm@18)/bin"
        if [ ! -d "$LLVM_BIN" ]; then
          brew install llvm@18
          LLVM_BIN="$(brew --prefix llvm@18)/bin"
        fi
        echo "$LLVM_BIN" >> "$GITHUB_PATH"

    # Windows runners may not have clang on PATH.
    - name: Ensure wasm-capable clang (Windows)
      if: inputs.skip-wasm != 'true' && runner.os == 'Windows'
      shell: bash
      run: |
        if ! command -v clang >/dev/null 2>&1; then
          choco install llvm --no-progress -y
        fi
        echo "C:\\Program Files\\LLVM\\bin" >> "$GITHUB_PATH"

    - name: Build wasm + renderer plugins
      if: inputs.skip-wasm != 'true'
      shell: bash
      run: cargo xtask wasm
