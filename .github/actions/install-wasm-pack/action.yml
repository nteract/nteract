name: Install wasm-pack
description: Install wasm-pack from the official rustwasm release artifacts.

inputs:
  version:
    description: wasm-pack version to install.
    required: false
    default: "0.15.0"

runs:
  using: composite
  steps:
    - name: Download wasm-pack
      shell: bash
      run: |
        set -euo pipefail

        version="${{ inputs.version }}"
        case "$RUNNER_OS" in
          Linux) os="unknown-linux-musl" ;;
          macOS) os="apple-darwin" ;;
          Windows) os="pc-windows-msvc" ;;
          *) echo "Unsupported runner OS: $RUNNER_OS" >&2; exit 1 ;;
        esac

        case "$RUNNER_ARCH" in
          X64) arch="x86_64" ;;
          ARM64) arch="aarch64" ;;
          *) echo "Unsupported runner arch: $RUNNER_ARCH" >&2; exit 1 ;;
        esac

        asset="wasm-pack-v${version}-${arch}-${os}.tar.gz"
        url="https://github.com/rustwasm/wasm-pack/releases/download/v${version}/${asset}"

        cache_dir=""
        cache_bin=""
        if [ -n "${NTERACT_RUNNER_TOOL_HOME:-}" ]; then
          cache_dir="${NTERACT_RUNNER_TOOL_HOME}/wasm-pack/${version}/${arch}-${os}"
          case "$RUNNER_OS" in
            Windows) cache_bin="$cache_dir/wasm-pack.exe" ;;
            *) cache_bin="$cache_dir/wasm-pack" ;;
          esac

          if [ -x "$cache_bin" ]; then
            echo "Using cached wasm-pack from $cache_bin"
            echo "$cache_dir" >> "$GITHUB_PATH"
            "$cache_bin" --version
            exit 0
          fi
        fi

        tmp="$(mktemp -d)"
        trap 'rm -rf "$tmp"' EXIT

        if curl --fail --location --show-error --retry 10 --retry-delay 2 --retry-all-errors \
          --output "$tmp/$asset" \
          "$url"; then
          tar -xzf "$tmp/$asset" -C "$tmp"
          bin="$(find "$tmp" -type f \( -name wasm-pack -o -name wasm-pack.exe \) -print -quit)"
        else
          echo "::warning::wasm-pack release download failed; falling back to cargo install"
          cargo_root="$tmp/cargo-install"
          cargo install wasm-pack --version "$version" --locked --root "$cargo_root"
          case "$RUNNER_OS" in
            Windows) bin="$cargo_root/bin/wasm-pack.exe" ;;
            *) bin="$cargo_root/bin/wasm-pack" ;;
          esac
        fi

        if [ -z "$bin" ]; then
          echo "wasm-pack binary not found in $asset" >&2
          exit 1
        fi

        install_dir="$RUNNER_TEMP/wasm-pack/bin"
        mkdir -p "$install_dir"
        cp "$bin" "$install_dir/"
        chmod +x "$install_dir/$(basename "$bin")"

        if [ -n "$cache_dir" ]; then
          mkdir -p "$cache_dir"
          cache_tmp="${cache_bin}.tmp.$$"
          cp "$install_dir/$(basename "$bin")" "$cache_tmp"
          chmod +x "$cache_tmp"
          mv "$cache_tmp" "$cache_bin"
          echo "Cached wasm-pack at $cache_bin"
        fi

        echo "$install_dir" >> "$GITHUB_PATH"

        "$install_dir/$(basename "$bin")" --version
