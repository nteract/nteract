# Auto-label PRs based on changed file paths.
# Used by the actions/labeler workflow in .github/workflows/labeler.yml
#
# Docs: https://github.com/actions/labeler

frontend:
  - changed-files:
    - any-glob-to-any-file:
      - 'apps/notebook/**'
      - 'src/components/**'
      - 'src/bindings/**'

daemon:
  - changed-files:
    - any-glob-to-any-file:
      - 'crates/runtimed/**'
      - 'crates/notebook-protocol/**'
      - 'crates/notebook-sync/**'
      - 'crates/kernel-env/**'
      - 'crates/kernel-launch/**'
      - 'crates/runt/**'
      - 'crates/runt-trust/**'
      - 'crates/runt-workspace/**'

trust:
  - changed-files:
    - any-glob-to-any-file:
      - 'crates/runt-trust/**'
      - 'crates/notebook/src/trust.rs'
      - 'crates/runtimed/src/requests/guarded.rs'
      - 'apps/notebook/src/hooks/useTrust.ts'
      - 'apps/notebook/src/components/TrustDialog.tsx'
      - 'apps/notebook/src/components/UntrustedBanner.tsx'
      - 'apps/notebook/src/components/__tests__/trust-dialog.test.tsx'
      - 'e2e/specs/trust-*.spec.js'
      - 'crates/notebook/fixtures/trust-tests/**'

editor:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/components/editor/**'
      - 'src/components/notebook/cursor-registry*'
      - 'apps/notebook/src/lib/cursor-registry*'
      - 'apps/notebook/src/lib/presence-sender*'

ipywidgets:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/components/widgets/**'
      - 'crates/runtimed/src/comm_state*'

mcp:
  - changed-files:
    - any-glob-to-any-file:
      - 'python/nteract/**'

presence:
  - changed-files:
    - any-glob-to-any-file:
      - 'crates/notebook-doc/src/presence*'
      - 'src/components/notebook/cursor-registry*'
      - 'src/components/notebook/presence-context*'
      - 'src/components/notebook/state/notebook-frame-bus*'
      - 'apps/notebook/src/lib/cursor-registry*'
      - 'apps/notebook/src/lib/presence-sender*'
      - 'apps/notebook/src/hooks/usePresence*'
      - 'apps/notebook/src/contexts/PresenceContext*'
      - 'apps/notebook/src/components/cell/CellPresenceIndicators*'
      - 'src/components/editor/remote-cursors*'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'docs/**'
      - 'contributing/**'
      - '.claude/rules/**'
      - '.claude/skills/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'

test:
  - changed-files:
    - any-glob-to-any-file:
      - 'e2e/**'
      - 'crates/runtimed/tests/**'
      - 'crates/notebook-sync/src/tests*'
      - 'python/runtimed/tests/**'
      - 'python/nteract/tests/**'
      - 'apps/notebook/src/lib/__tests__/**'

sync:
  - changed-files:
    - any-glob-to-any-file:
      - 'crates/notebook-sync/**'
      - 'crates/notebook-wire/**'
      - 'crates/runtimed/src/notebook_sync_server*'
      - 'crates/runtimed/src/notebook_sync_client*'
      - 'crates/runtimed-wasm/**'

notebook-dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'crates/kernel-env/**'
      - 'crates/notebook-doc/src/pep723*'
      - 'crates/notebook-doc/src/metadata*'
