name: Publish npm packages

# npm publishing for the runtimed Node bindings and Pi package.
#
# Publishes stable releases to the `latest` dist-tag via GitHub OIDC trusted
# publishing (no npm token required). Stable releases on the default branch
# invoke this workflow after the Stable Release workflow succeeds;
# workflow_dispatch remains available for republishing or filling in a missing
# package.
#
# Before using this workflow, configure npm trusted publishing for:
# - @runtimed/node
# - @runtimed/node-darwin-arm64
# - @runtimed/node-linux-x64-gnu
# - @runtimed/node-win32-x64-msvc
# - @nteract/pi

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Stable Release"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: npm-publish-stable
  cancel-in-progress: false

env:
  # Bake the stable channel into the published binding. runt-workspace reads
  # this at compile time via option_env!("RUNT_BUILD_CHANNEL") and falls back
  # to Nightly when unset, so without this defaultSocketPath() in the
  # published @runtimed/node would resolve under ~/.cache/runt-nightly. Source
  # builds (no env) intentionally stay on the Nightly default.
  RUNT_BUILD_CHANNEL: stable
  NPM_TRUSTED_PUBLISHING_MIN_VERSION: 11.5.1

jobs:
  pack-native:
    name: Pack native package (${{ matrix.target }})
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    # npm trusted publishing / provenance requires GitHub-hosted runners.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-latest
          - target: linux-x64-gnu
            runner: ubuntu-latest
          - target: win32-x64-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: dsherret/rust-toolchain-file@v1

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native binding
        run: pnpm --dir packages/runtimed-node build

      - name: Assemble platform package
        run: pnpm --dir packages/runtimed-node assemble:platform -- --expected-target "${{ matrix.target }}"

      - name: Verify platform package
        run: pnpm --dir packages/runtimed-node/npm/${{ matrix.target }} pack:dry-run

      - name: Pack platform package
        shell: bash
        run: pnpm --dir packages/runtimed-node/npm/${{ matrix.target }} pack --pack-destination "$RUNNER_TEMP"

      - name: Upload platform package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package-${{ matrix.target }}
          path: ${{ runner.temp }}/*.tgz
          if-no-files-found: error
          retention-days: 7

  publish-native:
    name: Publish native package (${{ matrix.target }})
    needs: [pack-native]
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        target: [darwin-arm64, linux-x64-gnu, win32-x64-msvc]
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Capture npm version
        id: npm-version
        run: echo "version=$(npm --version)" >> "$GITHUB_OUTPUT"

      - name: Verify npm trusted publishing support
        shell: bash
        run: |
          node <<'NODE'
          const current = process.env.NPM_VERSION.split(".").map(Number);
          const minimum = process.env.NPM_TRUSTED_PUBLISHING_MIN_VERSION.split(".").map(Number);
          for (let i = 0; i < 3; i++) {
            if ((current[i] ?? 0) > (minimum[i] ?? 0)) process.exit(0);
            if ((current[i] ?? 0) < (minimum[i] ?? 0)) {
              throw new Error(`npm ${process.env.NPM_VERSION} is older than ${process.env.NPM_TRUSTED_PUBLISHING_MIN_VERSION}`);
            }
          }
          NODE
        env:
          NPM_VERSION: ${{ steps.npm-version.outputs.version }}

      - name: Download platform package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package-${{ matrix.target }}
          path: ${{ runner.temp }}/npm-package

      - name: Publish platform package
        shell: bash
        run: |
          TARBALL="$(find "$RUNNER_TEMP/npm-package" -maxdepth 1 -name '*.tgz' -print -quit)"
          if [ -z "$TARBALL" ]; then
            echo "::error::No npm package tarball found"
            exit 1
          fi

          tar -xOf "$TARBALL" package/package.json > "$RUNNER_TEMP/package.json"
          PACKAGE="$(node -p "require(process.env.RUNNER_TEMP + '/package.json').name")"
          VERSION="$(node -p "require(process.env.RUNNER_TEMP + '/package.json').version")"

          if npm view "${PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE}@${VERSION} is already published; skipping."
            exit 0
          fi

          npm publish "$TARBALL" --tag latest --access public --provenance

  pack-wrapper:
    name: Pack wrapper package
    needs: [publish-native]
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    # npm trusted publishing / provenance requires GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: dsherret/rust-toolchain-file@v1

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native binding metadata
        run: pnpm --dir packages/runtimed-node build

      - name: Verify wrapper package
        run: pnpm --dir packages/runtimed-node pack:dry-run

      - name: Pack wrapper package
        shell: bash
        run: pnpm --dir packages/runtimed-node pack --pack-destination "$RUNNER_TEMP"

      - name: Verify wrapper package manifest
        run: |
          tar -xOf "$RUNNER_TEMP"/runtimed-node-*.tgz package/package.json > "$RUNNER_TEMP/wrapper-package.json"
          node <<'NODE'
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/wrapper-package.json`, "utf8"));
          const deps = manifest.dependencies ?? {};
          const optionalDeps = manifest.optionalDependencies ?? {};

          if (deps.runtimed) {
            throw new Error(`@runtimed/node tarball must not depend on private package runtimed; found ${deps.runtimed}`);
          }

          for (const [section, entries] of Object.entries({ dependencies: deps, optionalDependencies: optionalDeps })) {
            for (const [name, version] of Object.entries(entries)) {
              if (String(version).startsWith("workspace:")) {
                throw new Error(`${section}.${name} still uses workspace protocol in packed manifest`);
              }
            }
          }
          NODE

      - name: Upload wrapper package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package-wrapper
          path: ${{ runner.temp }}/runtimed-node-*.tgz
          if-no-files-found: error
          retention-days: 7

  publish-wrapper:
    name: Publish wrapper package
    needs: [pack-wrapper]
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Capture npm version
        id: npm-version
        run: echo "version=$(npm --version)" >> "$GITHUB_OUTPUT"

      - name: Verify npm trusted publishing support
        shell: bash
        run: |
          node <<'NODE'
          const current = process.env.NPM_VERSION.split(".").map(Number);
          const minimum = process.env.NPM_TRUSTED_PUBLISHING_MIN_VERSION.split(".").map(Number);
          for (let i = 0; i < 3; i++) {
            if ((current[i] ?? 0) > (minimum[i] ?? 0)) process.exit(0);
            if ((current[i] ?? 0) < (minimum[i] ?? 0)) {
              throw new Error(`npm ${process.env.NPM_VERSION} is older than ${process.env.NPM_TRUSTED_PUBLISHING_MIN_VERSION}`);
            }
          }
          NODE
        env:
          NPM_VERSION: ${{ steps.npm-version.outputs.version }}

      - name: Download wrapper package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package-wrapper
          path: ${{ runner.temp }}/npm-package

      - name: Publish wrapper package
        shell: bash
        run: |
          TARBALL="$(find "$RUNNER_TEMP/npm-package" -maxdepth 1 -name '*.tgz' -print -quit)"
          if [ -z "$TARBALL" ]; then
            echo "::error::No npm package tarball found"
            exit 1
          fi

          tar -xOf "$TARBALL" package/package.json > "$RUNNER_TEMP/package.json"
          PACKAGE="$(node -p "require(process.env.RUNNER_TEMP + '/package.json').name")"
          VERSION="$(node -p "require(process.env.RUNNER_TEMP + '/package.json').version")"

          if npm view "${PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE}@${VERSION} is already published; skipping."
            exit 0
          fi

          npm publish "$TARBALL" --tag latest --access public --provenance

  pack-pi:
    name: Pack Pi package
    needs: [publish-wrapper]
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    # npm trusted publishing / provenance requires GitHub-hosted runners.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Pi package
        run: pnpm --dir plugins/nteract/pi pack:dry-run

      - name: Pack Pi package
        shell: bash
        run: pnpm --dir plugins/nteract/pi pack --pack-destination "$RUNNER_TEMP"

      - name: Verify Pi package manifest
        run: |
          tar -xOf "$RUNNER_TEMP"/nteract-pi-*.tgz package/package.json > "$RUNNER_TEMP/pi-package.json"
          node <<'NODE'
          const fs = require("node:fs");
          const pi = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/pi-package.json`, "utf8"));
          const wrapper = JSON.parse(fs.readFileSync("packages/runtimed-node/package.json", "utf8"));
          const deps = pi.dependencies ?? {};

          if (deps["@runtimed/node"] !== wrapper.version) {
            throw new Error(`@nteract/pi must depend on @runtimed/node ${wrapper.version}; found ${deps["@runtimed/node"]}`);
          }

          for (const [name, version] of Object.entries(deps)) {
            if (String(version).startsWith("workspace:")) {
              throw new Error(`dependencies.${name} still uses workspace protocol in packed manifest`);
            }
          }
          NODE

      - name: Upload Pi package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package-pi
          path: ${{ runner.temp }}/nteract-pi-*.tgz
          if-no-files-found: error
          retention-days: 7

  publish-pi:
    name: Publish Pi package
    needs: [pack-pi]
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Capture npm version
        id: npm-version
        run: echo "version=$(npm --version)" >> "$GITHUB_OUTPUT"

      - name: Verify npm trusted publishing support
        shell: bash
        run: |
          node <<'NODE'
          const current = process.env.NPM_VERSION.split(".").map(Number);
          const minimum = process.env.NPM_TRUSTED_PUBLISHING_MIN_VERSION.split(".").map(Number);
          for (let i = 0; i < 3; i++) {
            if ((current[i] ?? 0) > (minimum[i] ?? 0)) process.exit(0);
            if ((current[i] ?? 0) < (minimum[i] ?? 0)) {
              throw new Error(`npm ${process.env.NPM_VERSION} is older than ${process.env.NPM_TRUSTED_PUBLISHING_MIN_VERSION}`);
            }
          }
          NODE
        env:
          NPM_VERSION: ${{ steps.npm-version.outputs.version }}

      - name: Download Pi package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package-pi
          path: ${{ runner.temp }}/npm-package

      - name: Publish Pi package
        shell: bash
        run: |
          TARBALL="$(find "$RUNNER_TEMP/npm-package" -maxdepth 1 -name '*.tgz' -print -quit)"
          if [ -z "$TARBALL" ]; then
            echo "::error::No npm package tarball found"
            exit 1
          fi

          tar -xOf "$TARBALL" package/package.json > "$RUNNER_TEMP/package.json"
          PACKAGE="$(node -p "require(process.env.RUNNER_TEMP + '/package.json').name")"
          VERSION="$(node -p "require(process.env.RUNNER_TEMP + '/package.json').version")"

          if npm view "${PACKAGE}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE}@${VERSION} is already published; skipping."
            exit 0
          fi

          npm publish "$TARBALL" --tag latest --access public --provenance
