name: Sift Preview

on:
  push:
    branches: [main]
    paths:
      - packages/sift/**
      - crates/nteract-predicate/**
      - crates/sift-wasm/**
  pull_request:
    paths:
      - packages/sift/**
      - crates/nteract-predicate/**
      - crates/sift-wasm/**

concurrency:
  group: sift-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Sift Preview
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-wasm

      - name: Install wasm-pack
        # Pin to 0.14.0+ for `--profile <NAME>` support; see comment in
        # `.github/workflows/build.yml`. Build from crates.io rather than
        # via a binary action so we don't break on transient release-asset
        # 404s; Swatinem/rust-cache covers ~/.cargo/bin between runs.
        run: cargo install --locked --version 0.14.0 wasm-pack

      - name: Build sift-wasm
        run: wasm-pack build crates/sift-wasm --target web --release

      - uses: voidzero-dev/setup-vp@v1
        with:
          run-install: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install

      - name: Generate demo data
        working-directory: packages/sift
        run: npx tsx src/generate-data.ts

      - name: Build sift demo
        working-directory: packages/sift
        run: vp build

      - name: Install Wrangler
        run: pnpm add -w wrangler@3.90.0

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/sift/dist --project-name=sift --branch=${{ github.head_ref || github.ref_name }}
          packageManager: pnpm

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        with:
          header: sift-preview
          message: |
            ## Sift Preview

            ${{ steps.deploy.outputs.deployment-url }}
