name: Smoke

# Cross-platform end-to-end smoke for the runtimed daemon: install (Windows)
# or build-from-source (Linux), spawn the daemon, drive it via MCP through
# `runt mcp`, and assert a real Python kernel launches and runs `print(1+1)`
# returning "2". Catches breakage in the install + daemon + kernel-launch
# path that the regular CI doesn't exercise.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag to run only the Windows app-launch smoke against.
        required: false
        type: string
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ format('{0}-{1}-{2}', github.workflow, github.ref, github.run_id) }}
  # Main and manual smoke runs are post-merge signal and should not be replaced
  # while pending.
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUNT_BUILD_CHANNEL: stable

jobs:
  windows-app-launch-smoke:
    name: Windows app launch smoke
    runs-on: windows-latest
    timeout-minutes: 20
    if: |
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    steps:
      - name: Resolve release asset
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
        run: |
          if (-not $env:RELEASE_TAG) {
            Write-Error "RELEASE_TAG was not resolved"
            exit 1
          }

          Write-Host "Release tag: $env:RELEASE_TAG"
          $asset = $null
          for ($i = 1; $i -le 60; $i++) {
            $releaseJson = gh release view $env:RELEASE_TAG --json assets
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Could not read release $env:RELEASE_TAG"
              exit 1
            }

            $assets = ($releaseJson | ConvertFrom-Json).assets
            $asset = $assets |
              Where-Object { $_.name -match '^nteract-(stable|nightly)-windows-x64\.exe$' } |
              Select-Object -First 1

            if ($asset) {
              break
            }

            Write-Host "Windows installer asset not visible yet (attempt $i/60); waiting..."
            Start-Sleep -Seconds 10
          }

          if (-not $asset) {
            Write-Error "Release $env:RELEASE_TAG does not contain a Windows x64 nteract installer"
            exit 1
          }

          Write-Host "Installer asset: $($asset.name)"
          "tag=$env:RELEASE_TAG" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8
          "asset=$($asset.name)" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Download published Windows installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          ASSET_NAME: ${{ steps.release.outputs.asset }}
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\release-asset" | Out-Null
          gh release download $env:RELEASE_TAG `
            --pattern $env:ASSET_NAME `
            --dir "$env:RUNNER_TEMP\release-asset"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to download $env:ASSET_NAME from $env:RELEASE_TAG"
            exit 1
          }

          $installer = Get-ChildItem -Path "$env:RUNNER_TEMP\release-asset" -Filter *.exe |
            Select-Object -First 1
          if (-not $installer) {
            Write-Error "No downloaded installer found"
            exit 1
          }

          Write-Host "Downloaded installer: $($installer.FullName)"
          "INSTALLER=$($installer.FullName)" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Install published app silently
        shell: pwsh
        run: |
          $installDir = "$env:RUNNER_TEMP\nteract-release-app-smoke"
          Write-Host "Installing $env:INSTALLER to $installDir"
          $proc = Start-Process -FilePath $env:INSTALLER `
            -ArgumentList "/S", "/D=$installDir" `
            -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            Write-Error "Installer exited with code $($proc.ExitCode)"
            exit $proc.ExitCode
          }

          Write-Host "Install dir contents:"
          Get-ChildItem -Path $installDir -Recurse | Select-Object FullName | Format-Table -AutoSize

          $runt = Join-Path $installDir "runt.exe"
          if (-not (Test-Path $runt)) {
            Write-Error "runt.exe not found at $runt"
            exit 1
          }

          $appExe = Get-ChildItem -Path $installDir -Filter *.exe |
            Where-Object { $_.Name -match '^nteract( Nightly)?\.exe$' } |
            Select-Object -First 1
          if (-not $appExe) {
            $appExe = Get-ChildItem -Path $installDir -Filter *.exe |
              Where-Object {
                $_.Name -notin @(
                  "runt.exe",
                  "runtimed.exe",
                  "nteract-mcp.exe",
                  "uninstall.exe"
                ) -and $_.Name -notmatch '^unins'
              } |
              Select-Object -First 1
          }
          if (-not $appExe) {
            Write-Error "Could not find installed desktop app executable in $installDir"
            exit 1
          }

          "INSTALL_DIR=$installDir" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "RUNT=$runt" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "APP_EXE=$($appExe.FullName)" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

          $bootstrapLog = Join-Path $env:LOCALAPPDATA "nteract\install-bootstrap.log"
          if (Test-Path $bootstrapLog) {
            Write-Host "=== installer bootstrap log ==="
            Get-Content $bootstrapLog
          } else {
            Write-Warning "Installer bootstrap log not found at $bootstrapLog"
          }

      - name: Launch app and wait for daemon
        shell: pwsh
        timeout-minutes: 5
        run: |
          Write-Host "Stopping any daemon left by installer or runner state"
          & $env:RUNT daemon stop 2>$null | Out-Null

          Write-Host "Launching desktop app: $env:APP_EXE"
          $app = Start-Process -FilePath $env:APP_EXE -PassThru
          Write-Host "App pid: $($app.Id)"

          $ready = $false
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 1

            if ($app.HasExited) {
              Write-Error "App process exited while waiting for daemon (code $($app.ExitCode))"
              break
            }

            $statusJson = & $env:RUNT daemon status --json 2>$null
            if ($LASTEXITCODE -ne 0 -or -not $statusJson) {
              continue
            }

            try {
              $status = $statusJson | ConvertFrom-Json
            } catch {
              continue
            }

            if ($status.running -eq $true) {
              Write-Host "Daemon ready after ${i}s"
              Write-Host $statusJson
              $ready = $true
              break
            }
          }

          if (-not $ready) {
            Write-Error "Installed app did not make the daemon available"
            exit 1
          }

      - name: Run diagnostics
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\app-launch-diag" | Out-Null
          if ($env:RUNT -and (Test-Path $env:RUNT)) {
            Push-Location "$env:RUNNER_TEMP\app-launch-diag"
            & $env:RUNT diagnostics
            Pop-Location
          } else {
            Write-Warning "RUNT was not available; skipping diagnostics command"
          }
          Get-ChildItem "$env:RUNNER_TEMP\app-launch-diag"

      - name: Dump app and daemon logs
        if: always()
        shell: pwsh
        run: |
          foreach ($logPath in @(
            "$env:LOCALAPPDATA\nteract\logs\notebook.log",
            "$env:LOCALAPPDATA\nteract\notebook.log",
            "$env:LOCALAPPDATA\runt\runtimed.log"
          )) {
            Write-Host "=== $logPath ==="
            if (Test-Path $logPath) {
              Get-Content $logPath
            } else {
              Write-Host "(not present)"
            }
          }

          Write-Host "Searching for notebook.log and runtimed.log under LOCALAPPDATA..."
          Get-ChildItem -Path $env:LOCALAPPDATA -Filter notebook.log -Recurse -ErrorAction SilentlyContinue |
            Select-Object FullName | Format-Table -AutoSize
          Get-ChildItem -Path $env:LOCALAPPDATA -Filter runtimed.log -Recurse -ErrorAction SilentlyContinue |
            Select-Object FullName | Format-Table -AutoSize

      - name: Stop app and daemon
        if: always()
        shell: pwsh
        run: |
          if ($env:APP_EXE) {
            $appName = [System.IO.Path]::GetFileNameWithoutExtension($env:APP_EXE)
            Get-Process -Name $appName -ErrorAction SilentlyContinue |
              Stop-Process -Force -ErrorAction SilentlyContinue
          }
          if ($env:RUNT) {
            & $env:RUNT daemon stop 2>$null | Out-Null
          }

      - name: Upload app-launch diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-app-launch-smoke-diagnostics
          path: |
            ${{ runner.temp }}\app-launch-diag\*.tar.gz
            ${{ runner.temp }}\release-asset\*.exe
          if-no-files-found: warn
          retention-days: 14

      - name: Notify #windows on failure
        if: failure()
        shell: bash
        env:
          DISCORD_WEBHOOK_WINDOWS: ${{ secrets.DISCORD_WEBHOOK_WINDOWS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_WINDOWS" ]; then
            echo "DISCORD_WEBHOOK_WINDOWS not set, skipping notification"
            exit 0
          fi
          curl --fail-with-body -sS -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Windows app-launch smoke failed\",
              \"description\": \"Published release \`${RELEASE_TAG}\` did not pass the installed app daemon-start canary. [View run]($RUN_URL).\",
              \"url\": \"$RUN_URL\",
              \"color\": 15158332
            }]
          }" "$DISCORD_WEBHOOK_WINDOWS"

  windows-smoke:
    name: Windows (build + install + smoke)
    runs-on: windows-latest
    timeout-minutes: 75
    if: github.event_name != 'release' && (github.event_name != 'workflow_dispatch' || inputs.release_tag == '')
    # The Windows leg currently runs ~32 minutes (cargo build + NSIS bundling
    # + smoke). Gating PRs on it would tax every diff, including frontend-only
    # changes that have no Windows surface. We run it post-merge and surface
    # failures via Discord (#windows) so the team can react fast without
    # blocking unrelated PRs.
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-smoke

      - name: Build runtime artifacts (wasm + renderer plugins + MCP widget)
        uses: ./.github/actions/build-runtime-artifacts
        with:
          include-mcp-widget: true

      - name: Build frontend
        run: pnpm build

      - name: Install Tauri CLI
        uses: ./.github/actions/install-tauri-cli

      - name: Build external binaries
        shell: bash
        run: |
          cargo build --release -p runtimed -p runt -p nteract-mcp
          TARGET=$(rustc --print host-tuple)
          mkdir -p crates/notebook/binaries
          cp target/release/runtimed.exe "crates/notebook/binaries/runtimed-$TARGET.exe"
          cp target/release/runt.exe "crates/notebook/binaries/runt-$TARGET.exe"
          cp target/release/nteract-mcp.exe "crates/notebook/binaries/nteract-mcp-$TARGET.exe"

      - name: Generate throwaway updater keypair
        # tauri.conf.json declares an updater pubkey for production releases,
        # so Tauri's config validator requires a matching private key at
        # build time. --config overrides can't skip this (an empty pubkey
        # still counts as "set"). Generate a single-use keypair on the
        # runner. The signature it produces is meaningless once the runner
        # tears down, which matches the install-and-throw-away smoke shape.
        shell: pwsh
        run: |
          $keyPath = "$env:RUNNER_TEMP\tauri-smoke.key"
          npx -y @tauri-apps/cli signer generate -w $keyPath --ci
          $keyContent = Get-Content $keyPath -Raw
          "TAURI_SIGNING_PRIVATE_KEY<<EOF" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "$keyContent" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "EOF" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Build NSIS installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/notebook
          args: --bundles nsis --config '{"build":{"beforeBuildCommand":""},"bundle":{"windows":{"signCommand":null}}}'
          includeUpdaterJson: false

      - name: Locate installer
        id: locate
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path target/release/bundle/nsis -Filter *.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No NSIS installer (.exe) found in target/release/bundle/nsis"
            exit 1
          }
          Write-Host "Installer: $($exe.FullName)"
          "installer=$($exe.FullName)" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Install silently
        # NSIS /S = silent. /D=path must be the LAST argument and unquoted (NSIS
        # convention). We pin the install dir so the smoke script knows where
        # to find runt.exe regardless of Tauri's installMode default.
        shell: pwsh
        run: |
          $installer = "${{ steps.locate.outputs.installer }}"
          $installDir = "$env:RUNNER_TEMP\nteract"
          Write-Host "Installing $installer to $installDir"
          $proc = Start-Process -FilePath $installer -ArgumentList "/S", "/D=$installDir" -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            Write-Error "Installer exited with code $($proc.ExitCode)"
            exit $proc.ExitCode
          }
          Write-Host "Install dir contents:"
          Get-ChildItem -Path $installDir -Recurse | Select-Object FullName | Format-Table -AutoSize
          "INSTALL_DIR=$installDir" | Out-File -Append -FilePath $env:GITHUB_ENV
          "RUNT=$installDir\runt.exe" | Out-File -Append -FilePath $env:GITHUB_ENV
          "RUNTIMED=$installDir\runtimed.exe" | Out-File -Append -FilePath $env:GITHUB_ENV
          "MCP=$installDir\nteract-mcp.exe" | Out-File -Append -FilePath $env:GITHUB_ENV

          $bootstrapLog = Join-Path $env:LOCALAPPDATA "nteract\install-bootstrap.log"
          if (Test-Path $bootstrapLog) {
            Write-Host "=== installer bootstrap log ==="
            Get-Content $bootstrapLog
          } else {
            Write-Warning "Installer bootstrap log not found at $bootstrapLog"
          }

          $cliName = if ($env:RUNT_BUILD_CHANNEL -eq "nightly") { "runt-nightly" } else { "runt" }
          $cmd = Get-Command $cliName -ErrorAction SilentlyContinue
          if (-not $cmd) {
            $userPath = [Environment]::GetEnvironmentVariable("Path", "User")
            foreach ($entry in $userPath -split ';') {
              if ($entry -and (Test-Path (Join-Path $entry "$cliName.cmd"))) {
                $env:PATH = "$entry;$env:PATH"
                $entry | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
                break
              }
            }
            $cmd = Get-Command $cliName -ErrorAction SilentlyContinue
          }
          if (-not $cmd) {
            Write-Error "$cliName was not discoverable after silent install"
            exit 1
          }
          Write-Host "$cliName resolved to $($cmd.Source)"
          "RUNT_CMD=$($cmd.Source)" | Out-File -Append -FilePath $env:GITHUB_ENV

          $nbName = if ($env:RUNT_BUILD_CHANNEL -eq "nightly") { "nb-nightly" } else { "nb" }
          $nbPath = Join-Path (Split-Path -Parent $cmd.Source) "$nbName.cmd"
          if (-not (Test-Path $nbPath)) {
            Write-Error "$nbName shim was not installed next to $cliName ($nbPath)"
            exit 1
          }
          Write-Host "$nbName resolved to $nbPath"

      - name: runt --version
        shell: pwsh
        run: |
          if (-not (Test-Path $env:RUNT)) {
            Write-Error "runt.exe not found at $env:RUNT"
            exit 1
          }
          & $env:RUNT --version
          & $env:RUNT_CMD --version

      - name: Verify installer bootstrap
        shell: pwsh
        run: |
          Write-Host "=== daemon status after installer ==="
          $statusJson = & $env:RUNT_CMD daemon status --json
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Installed CLI could not read daemon status"
            exit 1
          }
          Write-Host $statusJson
          $status = $statusJson | ConvertFrom-Json
          # The installer sets up the daemon service and startup script but
          # does NOT start the daemon process (--no-start in bootstrap hook).
          # Spawning a long-running daemon from inside the installer's Windows
          # Job Object would leave it in the Job and block the Install silently
          # step until the 75-minute runner timeout. The daemon starts at login
          # via the Startup folder entry, or the smoke test starts it explicitly.
          if ($status.installed -ne $true) {
            Write-Error "Installer did not leave the daemon installed"
            exit 1
          }
          if ($status.running -eq $true) {
            Write-Host "Daemon is already running (unexpected but acceptable)"
          } else {
            Write-Host "Daemon installed but not yet running (expected with --no-start)"
          }
          if (-not (Test-Path $env:MCP)) {
            Write-Error "nteract-mcp.exe not found at $env:MCP"
            exit 1
          }
          # No standalone startup probe: nteract-mcp is a JSON-RPC stdio
          # server with no boot phase. It reads stdin for an `initialize`
          # request and exits with `connection closed` if stdin EOFs first.
          # `Start-Process -RedirectStandardOutput` doesn't pipe stdin from
          # the parent, so a bare-launch probe always fails. The "Run daemon
          # and smoke" step below exercises the same binary end-to-end with
          # a real MCP client, which is the test we actually want.

      - name: Set up Python for MCP smoke
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MCP client SDK
        shell: pwsh
        run: pip install "mcp>=1.0"

      - name: Run daemon and smoke (single step)
        # Variant 1: keep the daemon and the smoke script inside one step,
        # so the daemon's parent pwsh process lives for the whole duration.
        # Run #24972607401 spawned the daemon in one step and tried to use
        # it in the next; the runner's job object reaped the daemon when
        # the spawning step ended (visible as runtimed.log holding only
        # the early-startup line, then `runt ps` failing with "file not
        # found"). Collapsing into one step avoids that lifecycle issue.
        #
        # Pool sizes: 1 UV env, no conda or pixi. Pass args as a single
        # string (PowerShell -ArgumentList array form re-tokenizes
        # inconsistently and silently dropped --uv-pool-size 1 in the prior
        # run, defaulting to a 3-env warm).
        shell: pwsh
        timeout-minutes: 15
        run: |
          # Daemon was not started by the installer (--no-start in bootstrap hook).
          # Stop any daemon that may be running from a previous run or login entry.
          & $env:RUNT_CMD daemon stop 2>$null | Out-Null

          $logOut = "$env:RUNNER_TEMP\runtimed.stdout.log"
          $logErr = "$env:RUNNER_TEMP\runtimed.stderr.log"
          # The daemon CLI log level does not propagate to the runtime-agent
          # subprocess, but RUST_LOG is inherited and keeps kernel-launch
          # diagnostics visible in the collected stderr artifact.
          $env:RUST_LOG = "info"
          $daemon = Start-Process -FilePath $env:RUNTIMED `
            -ArgumentList @('--log-level', 'info', 'run', '--uv-pool-size', '1', '--conda-pool-size', '0', '--pixi-pool-size', '0') `
            -WindowStyle Hidden -PassThru `
            -RedirectStandardOutput $logOut -RedirectStandardError $logErr
          Write-Host "Daemon pid: $($daemon.Id)"

          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 1
            if ($daemon.HasExited) {
              Write-Error "Daemon exited prematurely (code $($daemon.ExitCode)) after ${i}s"
              break
            }
            $result = & $env:RUNT daemon status --json 2>$null
            if ($LASTEXITCODE -eq 0) {
              try {
                $parsed = $result | ConvertFrom-Json
                if ($parsed.running -eq $true) {
                  Write-Host "Daemon ready after ${i}s"
                  Write-Host $result
                  $ready = $true
                  break
                }
              } catch {}
            }
          }
          if (-not $ready) {
            Write-Host "--- runtimed.stdout ---"
            if (Test-Path $logOut) { Get-Content $logOut }
            Write-Host "--- runtimed.stderr ---"
            if (Test-Path $logErr) { Get-Content $logErr }
            exit 1
          }

          Write-Host "=== runt ps ==="
          & $env:RUNT ps
          if ($LASTEXITCODE -ne 0) { Write-Error "runt ps failed"; exit 1 }

          Write-Host "=== runt diagnostics ==="
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\diag" | Out-Null
          Push-Location "$env:RUNNER_TEMP\diag"
          & $env:RUNT diagnostics
          $diagExit = $LASTEXITCODE
          Pop-Location
          if ($diagExit -ne 0) { Write-Error "runt diagnostics failed: $diagExit"; exit $diagExit }
          Get-ChildItem "$env:RUNNER_TEMP\diag"

          Write-Host "=== MCP smoke ==="
          python scripts/smoke-mcp.py "$env:RUNT"
          $smokeExit = $LASTEXITCODE

          Write-Host "=== Tearing down daemon ==="
          if (-not $daemon.HasExited) {
            Stop-Process -Id $daemon.Id -Force -ErrorAction SilentlyContinue
          }

          if ($smokeExit -ne 0) { exit $smokeExit }

      - name: Dump daemon stdout/stderr to CI console
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== runtimed.stdout.log ==="
          if (Test-Path "$env:RUNNER_TEMP\runtimed.stdout.log") {
            Get-Content "$env:RUNNER_TEMP\runtimed.stdout.log"
          } else {
            Write-Host "(not present)"
          }
          Write-Host ""
          Write-Host "=== runtimed.stderr.log ==="
          if (Test-Path "$env:RUNNER_TEMP\runtimed.stderr.log") {
            Get-Content "$env:RUNNER_TEMP\runtimed.stderr.log"
          } else {
            Write-Host "(not present)"
          }
          Write-Host ""
          Write-Host "=== runtimed.log (daemon log via dirs::cache_dir) ==="
          $logPath = "$env:LOCALAPPDATA\runt\runtimed.log"
          if (Test-Path $logPath) {
            Get-Content $logPath
          } else {
            Write-Host "(not present at $logPath)"
            Write-Host "Searching for runtimed.log under LOCALAPPDATA..."
            Get-ChildItem -Path $env:LOCALAPPDATA -Filter runtimed.log -Recurse -ErrorAction SilentlyContinue | Select-Object FullName | Format-Table -AutoSize
          }

      - name: Re-run diagnostics post-smoke
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\diag-post" | Out-Null
          Push-Location "$env:RUNNER_TEMP\diag-post"
          & $env:RUNT diagnostics
          Pop-Location
          Get-ChildItem "$env:RUNNER_TEMP\diag-post"

      - name: Upload diagnostics tarballs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-smoke-diagnostics
          path: |
            ${{ runner.temp }}\diag\*.tar.gz
            ${{ runner.temp }}\diag-post\*.tar.gz
            ${{ runner.temp }}\runtimed.stdout.log
            ${{ runner.temp }}\runtimed.stderr.log
            ${{ runner.temp }}\nteract-mcp.stdout.log
            ${{ runner.temp }}\nteract-mcp.stderr.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-smoke-installer
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14

      # Post-merge canary: ping #windows when this leg fails so the team
      # can react without us having to gate every PR on the 32-minute
      # Windows build. No-ops cleanly when the webhook secret is unset
      # (e.g. fork PRs).
      - name: Notify #windows on failure
        if: failure()
        shell: bash
        env:
          DISCORD_WEBHOOK_WINDOWS: ${{ secrets.DISCORD_WEBHOOK_WINDOWS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref_name }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_WINDOWS" ]; then
            echo "DISCORD_WEBHOOK_WINDOWS not set, skipping notification"
            exit 0
          fi
          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          curl --fail-with-body -sS -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Windows smoke failed on $REF\",
              \"description\": \"Commit \`$SHORT_SHA\` broke the Windows smoke gate. [View run]($RUN_URL).\",
              \"url\": \"$RUN_URL\",
              \"color\": 15158332
            }]
          }" "$DISCORD_WEBHOOK_WINDOWS"

  linux-smoke:
    name: Linux (build + smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name != 'release' && (github.event_name != 'workflow_dispatch' || inputs.release_tag == '')
    # Keep this native smoke off per-commit PR CI. It still runs after merge
    # and can be queued manually when a PR needs the extra signal.
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-smoke

      - name: Build runtime artifacts (wasm + renderer plugins + MCP widget)
        uses: ./.github/actions/build-runtime-artifacts
        with:
          include-mcp-widget: true

      - name: Build runtimed and runt
        run: cargo build --release -p runtimed -p runt -p nteract-mcp

      - name: Set up Python for MCP smoke
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MCP client SDK
        run: pip install "mcp>=1.0"

      - name: Run daemon and smoke
        timeout-minutes: 15
        run: |
          set -uo pipefail
          mkdir -p "$RUNNER_TEMP/diag"
          LOG_OUT="$RUNNER_TEMP/runtimed.stdout.log"
          LOG_ERR="$RUNNER_TEMP/runtimed.stderr.log"

          ./target/release/runtimed run \
            --uv-pool-size 1 \
            --conda-pool-size 0 \
            --pixi-pool-size 0 \
            > "$LOG_OUT" 2> "$LOG_ERR" &
          DAEMON_PID=$!
          echo "Daemon pid: $DAEMON_PID"

          ready=0
          for i in $(seq 1 30); do
            sleep 1
            if ! kill -0 "$DAEMON_PID" 2>/dev/null; then
              echo "Daemon exited prematurely"
              break
            fi
            STATUS=$(./target/release/runt daemon status --json 2>/dev/null || true)
            if [ -n "$STATUS" ] && echo "$STATUS" | python3 -c 'import sys,json; sys.exit(0 if json.load(sys.stdin).get("running") else 1)' 2>/dev/null; then
              echo "Daemon ready after ${i}s"
              echo "$STATUS"
              ready=1
              break
            fi
          done

          if [ "$ready" -ne 1 ]; then
            echo "--- runtimed.stdout ---"; cat "$LOG_OUT" 2>/dev/null || true
            echo "--- runtimed.stderr ---"; cat "$LOG_ERR" 2>/dev/null || true
            kill "$DAEMON_PID" 2>/dev/null || true
            exit 1
          fi

          echo "=== runt ps ==="
          ./target/release/runt ps || { kill "$DAEMON_PID" 2>/dev/null || true; exit 1; }

          echo "=== runt diagnostics ==="
          (cd "$RUNNER_TEMP/diag" && "$GITHUB_WORKSPACE/target/release/runt" diagnostics)
          ls "$RUNNER_TEMP/diag"

          echo "=== MCP smoke ==="
          set +e
          python scripts/smoke-mcp.py ./target/release/runt
          smoke_exit=$?
          set -e

          echo "=== Tearing down daemon ==="
          kill "$DAEMON_PID" 2>/dev/null || true
          wait "$DAEMON_PID" 2>/dev/null || true

          exit "$smoke_exit"

      - name: Dump daemon stdout/stderr to CI console
        if: always()
        run: |
          echo "=== runtimed.stdout.log ==="
          cat "$RUNNER_TEMP/runtimed.stdout.log" 2>/dev/null || echo "(not present)"
          echo
          echo "=== runtimed.stderr.log ==="
          cat "$RUNNER_TEMP/runtimed.stderr.log" 2>/dev/null || echo "(not present)"
          echo
          echo "=== runtimed.log (daemon log via dirs::cache_dir) ==="
          for log in "$HOME/.cache/runt/runtimed.log" "$HOME/.cache/runt-nightly/runtimed.log"; do
            if [ -f "$log" ]; then
              echo "--- $log ---"
              cat "$log"
            fi
          done

      - name: Upload diagnostics tarballs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-smoke-diagnostics
          path: |
            ${{ runner.temp }}/diag/*.tar.gz
            ${{ runner.temp }}/runtimed.stdout.log
            ${{ runner.temp }}/runtimed.stderr.log
          if-no-files-found: warn
          retention-days: 14
