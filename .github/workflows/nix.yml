name: Nix

on:
  push:
    branches: [main]
    paths:
      - 'pnpm-lock.yaml'
      - 'flake.nix'
      - 'flake.lock'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  update-hashes:
    name: Update Nix hashes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check pnpmDeps hash
        id: check
        run: |
          set +e
          OUTPUT=$(nix build .#pnpmDeps --no-link 2>&1)
          EXIT=$?
          set -e

          if [ $EXIT -eq 0 ]; then
            echo "hash_ok=true" >> "$GITHUB_OUTPUT"
            echo "pnpmDeps hash is up to date"
          else
            NEW_HASH=$(echo "$OUTPUT" | grep 'got:' | awk '{print $2}')
            if [ -n "$NEW_HASH" ]; then
              echo "hash_ok=false" >> "$GITHUB_OUTPUT"
              echo "new_hash=$NEW_HASH" >> "$GITHUB_OUTPUT"
              echo "pnpmDeps hash outdated, new hash: $NEW_HASH"
            else
              echo "Build failed for unknown reason:"
              echo "$OUTPUT"
              exit 1
            fi
          fi

      - name: Update pnpmDeps hash in flake.nix
        if: steps.check.outputs.hash_ok == 'false'
        run: |
          NEW_HASH="${{ steps.check.outputs.new_hash }}"
          sed -i "s|hash = \"sha256-.*\";|hash = \"$NEW_HASH\";|" flake.nix
          echo "Updated hash to $NEW_HASH"

      - name: Create or update PR
        if: steps.check.outputs.hash_ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/nix-hash-update"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          git add flake.nix
          git commit -m "chore(nix): update pnpmDeps hash"
          git push --force origin "$BRANCH"

          # create PR if none exists, otherwise force-push updates it
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "chore(nix): update pnpmDeps hash" \
              --body "Automated update of the pnpmDeps hash in flake.nix. Triggered because pnpm-lock.yaml changed and the pre-fetched offline store hash is stale." \
              --head "$BRANCH"
          else
            echo "PR #$EXISTING already exists, branch updated via force-push"
          fi

