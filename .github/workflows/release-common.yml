        uses: actions/upload-artifact@v4
        with:
          name: nteract-macos-x64
          path: artifacts/

      - name: Upload raw nteract-mcp binary for plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: plugin-nteract-mcp-x86_64-apple-darwin
          path: crates/notebook/binaries/nteract-mcp-x86_64-apple-darwin
          if-no-files-found: error

  build-notebook-windows-x64:
    name: Build Windows x64 Notebook
    runs-on: blacksmith-4vcpu-windows-2025
    needs: [compute-version, build-wasm]
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-notebook-x64"

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Warm up sccache
        uses: ./.github/actions/sccache-warmup

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts

      - uses: ./.github/actions/build-runtime-artifacts
        with:
          skip-wasm: true

      - name: Build frontend
        run: pnpm build

      - name: Install cargo-binstall
        shell: pwsh
        env:
          BINSTALL_VERSION: v1.18.1
        run: |
          Set-ExecutionPolicy Unrestricted -Scope Process -Force
          iex (iwr "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1").Content

      - name: Install Tauri CLI
        uses: ./.github/actions/install-tauri-cli

      - name: Install trusted-signing-cli
        run: cargo binstall trusted-signing-cli --no-confirm --locked --force

      - name: Set version in tauri.conf.json
        shell: pwsh
        run: |
          $version = "${{ needs.compute-version.outputs.version }}"
          $channel = "${{ env.RUNT_BUILD_CHANNEL }}".ToLowerInvariant()
          switch ($channel) {
            "nightly" {
              $productName = "nteract Nightly"
              $bundleId = "org.nteract.desktop.nightly"
            }
            default {
              $productName = "nteract"
              $bundleId = "org.nteract.desktop"
            }
          }
          Write-Host "Setting version to: $version"
          $tauriConf = Get-Content crates/notebook/tauri.conf.json -Raw
          $tauriConf = $tauriConf -replace '"version": "[^"]+"', "`"version`": `"$version`""
          $tauriConf = $tauriConf -replace '"productName": "[^"]+"', "`"productName`": `"$productName`""
          $tauriConf = $tauriConf -replace '"identifier": "[^"]+"', "`"identifier`": `"$bundleId`""
          $tauriConf = $tauriConf -replace 'https://github.com/nteract/desktop/releases/download/stable-latest/latest.json', 'https://github.com/nteract/desktop/releases/download/${{ inputs.updater_channel_tag }}/latest.json'
          Set-Content crates/notebook/tauri.conf.json $tauriConf
          $runtCargo = Get-Content crates/runt/Cargo.toml -Raw
          $runtCargo = $runtCargo -replace '(?m)^version = ".*"$', "version = `"$version`""
          Set-Content crates/runt/Cargo.toml $runtCargo

      - name: Generate Icons
        shell: pwsh
        run: |
          $channel = "${{ env.RUNT_BUILD_CHANNEL }}".ToLowerInvariant()
          $iconSource = "crates/notebook/icons/source.png"
          if ($channel -eq "nightly" -and (Test-Path "crates/notebook/icons/source-nightly.png")) {
            $iconSource = "crates/notebook/icons/source-nightly.png"
          }
          cargo xtask icons $iconSource

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - name: Build MCP output widget
        run: pnpm --filter nteract-mcp-app install && vp run nteract-mcp-app#build

      - name: Build external binaries
        shell: bash
        run: |
          cargo build --release -p runtimed -p runt -p nteract-mcp
          TARGET=$(rustc --print host-tuple)
          mkdir -p crates/notebook/binaries
          cp target/release/runtimed.exe "crates/notebook/binaries/runtimed-$TARGET.exe"
          cp target/release/runt.exe "crates/notebook/binaries/runt-$TARGET.exe"
          cp target/release/nteract-mcp.exe "crates/notebook/binaries/nteract-mcp-$TARGET.exe"

      - name: Locate signing tools
        shell: pwsh
        run: |
          # Find signtool.exe from the Windows SDK
          $sdkRoot = (Get-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots" -Name KitsRoot10).KitsRoot10
          $signtool = Get-ChildItem -Path "$sdkRoot\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "\\x64\\" } |
            Sort-Object { [version]($_.FullName -replace '.*\\(\d+\.\d+\.\d+\.\d+)\\.*','$1') } -Descending |
            Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }
          Write-Host "Found signtool: $($signtool.FullName)"
          "SIGNTOOL_PATH=$($signtool.FullName)" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

          # Find Azure CLI
          $azCmd = (Get-Command az -ErrorAction SilentlyContinue).Source
          if (-not $azCmd) { throw "Azure CLI not found" }
          Write-Host "Found Azure CLI: $azCmd"
          "AZURE_CLI_PATH=$azCmd" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          projectPath: crates/notebook
          args: --bundles nsis --config '{"build":{"beforeBuildCommand":""}}'
          includeUpdaterJson: false

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          shopt -s nullglob
          NSIS_BINARIES=(target/release/bundle/nsis/*.exe)
          shopt -u nullglob

          if [ ${#NSIS_BINARIES[@]} -eq 0 ]; then
            echo "::error::No NSIS installer (.exe) found in target/release/bundle/nsis"
            exit 1
          fi

          NSIS_PATH="${NSIS_BINARIES[0]}"
          cp "$NSIS_PATH" "artifacts/nteract-${CHANNEL}-windows-x64.exe"

          NSIS_SIG_PATH="${NSIS_PATH}.sig"
          if [ -f "$NSIS_SIG_PATH" ]; then
            cp "$NSIS_SIG_PATH" "artifacts/nteract-${CHANNEL}-windows-x64.exe.sig"
          else
            echo "::error::Missing updater signature for $NSIS_PATH"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nteract-windows-x64
          path: artifacts/

      - name: Upload raw nteract-mcp binary for plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: plugin-nteract-mcp-x86_64-pc-windows-msvc
          path: crates/notebook/binaries/nteract-mcp-x86_64-pc-windows-msvc.exe
          if-no-files-found: error

  build-notebook-linux-x64:
    name: Build Linux x64 Notebook
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: [compute-version, build-wasm]
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-notebook-x64"

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Warm up sccache
        uses: ./.github/actions/sccache-warmup

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts

      - uses: ./.github/actions/build-runtime-artifacts
        with:
          skip-wasm: true

      - name: Build frontend
        run: pnpm build

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --no-confirm --locked --force

      - name: Set version in tauri.conf.json
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          echo "Setting version to: ${VERSION}"
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          if [ "$CHANNEL" = "nightly" ]; then
            PRODUCT_NAME="nteract Nightly"
            BUNDLE_ID="org.nteract.desktop.nightly"
          else
            PRODUCT_NAME="nteract"
            BUNDLE_ID="org.nteract.desktop"
          fi
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" crates/notebook/tauri.conf.json
          sed -i "s/\"productName\": \"[^\"]*\"/\"productName\": \"${PRODUCT_NAME}\"/" crates/notebook/tauri.conf.json
          sed -i "s/\"identifier\": \"[^\"]*\"/\"identifier\": \"${BUNDLE_ID}\"/" crates/notebook/tauri.conf.json
          sed -i "s#https://github.com/nteract/desktop/releases/download/stable-latest/latest.json#https://github.com/nteract/desktop/releases/download/${{ inputs.updater_channel_tag }}/latest.json#" crates/notebook/tauri.conf.json
          sed -i "s/^version = .*/version = \"${VERSION}\"/" crates/runt/Cargo.toml
          sed -i "s/^version = .*/version = \"${VERSION}\"/" crates/runtimed/Cargo.toml

      - name: Generate Icons
        run: |
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          ICON_SOURCE="crates/notebook/icons/source.png"
          if [ "$CHANNEL" = "nightly" ] && [ -f "crates/notebook/icons/source-nightly.png" ]; then
            ICON_SOURCE="crates/notebook/icons/source-nightly.png"
          fi
          cargo xtask icons "$ICON_SOURCE"

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - name: Build MCP output widget
        run: pnpm --filter nteract-mcp-app install && vp run nteract-mcp-app#build

      - name: Build external binaries
        run: |
          cargo build --release -p runtimed -p runt -p nteract-mcp
          TARGET=$(rustc --print host-tuple)
          mkdir -p crates/notebook/binaries
          cp target/release/runtimed "crates/notebook/binaries/runtimed-$TARGET"
          cp target/release/runt "crates/notebook/binaries/runt-$TARGET"
          cp target/release/nteract-mcp "crates/notebook/binaries/nteract-mcp-$TARGET"

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/notebook
          args: --bundles appimage --config '{"build":{"beforeBuildCommand":""}}'
          includeUpdaterJson: false

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          APPIMAGE_PATH=$(find target/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$APPIMAGE_PATH" "artifacts/nteract-${CHANNEL}-linux-x64.AppImage"
          for f in target/release/bundle/appimage/*.AppImage.sig; do
            [ -f "$f" ] && cp "$f" "artifacts/nteract-${CHANNEL}-linux-x64.AppImage.sig"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nteract-linux-x64
          path: artifacts/

      - name: Upload raw nteract-mcp binary for plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: plugin-nteract-mcp-x86_64-unknown-linux-gnu
          path: crates/notebook/binaries/nteract-mcp-x86_64-unknown-linux-gnu
          if-no-files-found: error

  smoke-fedora-appimage:
    name: Smoke Fedora AppImage
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: [build-notebook-linux-x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: nteract-linux-x64
          path: artifacts

      - name: Smoke AppImage in Fedora
        run: |
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          APPIMAGE="artifacts/nteract-${CHANNEL}-linux-x64.AppImage"
          docker run --rm \
            -v "${PWD}:/workspace" \
            -w /workspace \
            fedora:latest \
            bash -lc '
              set -euo pipefail
              dnf install -y coreutils findutils fuse-libs grep procps-ng systemd
              bash scripts/ci/fedora-appimage-smoke.sh "$1"
            ' bash "$APPIMAGE"

  build-nteract-package:
    name: Build nteract Package
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: compute-version
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Set dev version
        if: inputs.github_release_prerelease
        run: |
          CURRENT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          MAJOR_MINOR="${CURRENT_VERSION%.*}"
          PATCH="${CURRENT_VERSION##*.}"
          NEXT_PATCH=$((PATCH + 1))
          TIMESTAMP="${{ needs.compute-version.outputs.timestamp }}"
          DEV_VERSION="${MAJOR_MINOR}.${NEXT_PATCH}a${TIMESTAMP}"
          echo "Setting nteract version to: ${DEV_VERSION}"
          sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" pyproject.toml
          # Pin runtimed dep to the same prerelease timestamp
          sed -i "s/runtimed>=[^,]*/runtimed>=${DEV_VERSION}/" pyproject.toml
        working-directory: python/nteract

      - name: Build sdist + wheel
        run: uv build --no-sources
        working-directory: python/nteract

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: nteract-dist
          path: dist
          if-no-files-found: error

  build-dx-package:
    name: Build dx Package
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: compute-version
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Set dev version
        if: inputs.github_release_prerelease
        run: |
          CURRENT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          MAJOR_MINOR="${CURRENT_VERSION%.*}"
          PATCH="${CURRENT_VERSION##*.}"
          NEXT_PATCH=$((PATCH + 1))
          TIMESTAMP="${{ needs.compute-version.outputs.timestamp }}"
          DEV_VERSION="${MAJOR_MINOR}.${NEXT_PATCH}a${TIMESTAMP}"
          echo "Setting dx version to: ${DEV_VERSION}"
          sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" pyproject.toml
        working-directory: python/dx

      - name: Build sdist + wheel
        run: uv build --no-sources
        working-directory: python/dx

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dx-dist
          # uv build in a workspace writes to repo-root dist/, not
          # python/dx/dist — same as the nteract job above.
          path: dist/dx-*
          if-no-files-found: error

  build-python-wheels:
    name: Build Python Wheels (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    needs: [compute-version, build-wasm]
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    strategy:
      matrix:
        platform:
          - runner: macos-14-xlarge
            target: aarch64-apple-darwin
          - runner: macos-14-xlarge
            target: x86_64-apple-darwin
          - runner: blacksmith-4vcpu-ubuntu-2404
            target: x86_64-unknown-linux-gnu
          - runner: nteract-windows-xlarge
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Install compilation target
        run: rustup target add ${{ matrix.platform.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "python-${{ matrix.platform.target }}"

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Warm up sccache
        uses: ./.github/actions/sccache-warmup

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts

      - uses: ./.github/actions/build-runtime-artifacts
        with:
          skip-wasm: true

      - name: Build runtimed binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release --target ${{ matrix.platform.target }} -p runtimed
          cp target/${{ matrix.platform.target }}/release/runtimed python/runtimed/src/runtimed/_bin/
          chmod +x python/runtimed/src/runtimed/_bin/runtimed

      - name: Build runtimed binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.platform.target }} -p runtimed
          cp target/${{ matrix.platform.target }}/release/runtimed.exe python/runtimed/src/runtimed/_bin/

      - name: Set dev version (Unix)
        if: runner.os != 'Windows' && inputs.github_release_prerelease
        run: |
          CURRENT_VERSION=$(grep '^version' python/runtimed/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # Bump patch and use alpha tag so it sorts after current stable (PEP 440)
          MAJOR_MINOR="${CURRENT_VERSION%.*}"
          PATCH="${CURRENT_VERSION##*.}"
          NEXT_PATCH=$((PATCH + 1))
          TIMESTAMP="${{ needs.compute-version.outputs.timestamp }}"
          DEV_VERSION="${MAJOR_MINOR}.${NEXT_PATCH}a${TIMESTAMP}"
          echo "Setting Python version to: ${DEV_VERSION}"
          sed -i.bak "s/^version = .*/version = \"${DEV_VERSION}\"/" python/runtimed/pyproject.toml

      - name: Set dev version (Windows)
        if: runner.os == 'Windows' && inputs.github_release_prerelease
        shell: pwsh
        run: |
          $content = Get-Content python/runtimed/pyproject.toml -Raw
          if ($content -match 'version = "([^"]+)"') {
            $currentVersion = $matches[1]
          }
          # Bump patch and use alpha tag so it sorts after current stable (PEP 440)
          $parts = $currentVersion.Split('.')
          $parts[2] = [string]([int]$parts[2] + 1)
          $nextVersion = $parts -join '.'
          $timestamp = "${{ needs.compute-version.outputs.timestamp }}"
          $devVersion = "${nextVersion}a${timestamp}"
          Write-Host "Setting Python version to: $devVersion"
          $content = $content -replace 'version = "[^"]+"', "version = `"$devVersion`""
          Set-Content python/runtimed/pyproject.toml $content -NoNewline

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          working-directory: python/runtimed
          # sccache is installed and selected above with RUSTC_WRAPPER. Letting
          # maturin-action manage sccache as well can leave its post-build stats
          # step talking to a different client/server version.
          sccache: false
          maturin-version: "v1.11.5"

      - name: Print sccache stats
        if: always()
        shell: bash
        run: |
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats || true
          else
            echo "sccache is not available on PATH"
          fi

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.target }}
          path: python/runtimed/dist

  publish-plugin:
    # Assemble this release's channel-slice of the agent plugin
    # distribution repo (nteract/agent-plugins). One repo, two plugins:
    # "nteract" (stable) and "nightly" (dev). Each channel's publish
    # only touches its own plugins/<name>/ subtree and its entry in
    # marketplace.json, so serial stable+nightly releases compose
    # without stomping each other.
    #
    # Skipped when publish_plugin_channel is empty (workflow_dispatch
    # testing can opt out).
    name: Publish agent plugins
    if: inputs.publish_plugin_channel != ''
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs:
      [
        compute-version,
        build-notebook-macos-arm64,
        build-notebook-macos-x64,
        build-notebook-windows-x64,
        build-notebook-linux-x64,
      ]
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 1

      - name: Download nteract-mcp binaries
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-nteract-mcp-*
          path: plugin-binaries-staged
          merge-multiple: false

      - name: Flatten binary artifacts into a single directory
        run: |
          mkdir -p plugin-binaries
          # Each artifact is a directory named plugin-nteract-mcp-<target>
          # containing one file (the raw binary, with .exe suffix on Windows).
          # Flatten by copying the inner files out by basename.
          for d in plugin-binaries-staged/plugin-nteract-mcp-*; do
            for f in "$d"/*; do
              cp "$f" "plugin-binaries/$(basename "$f")"
            done
          done
          echo "staged binaries:"
          ls -la plugin-binaries

      - name: Checkout distribution repo
        uses: actions/checkout@v6
        with:
          lfs: true
          repository: nteract/agent-plugins
          token: ${{ secrets.CLAUDE_PLUGIN_DEPLOY_TOKEN }}
          path: plugin-dist-repo
          fetch-depth: 1

      - name: Configure git identity
        working-directory: plugin-dist-repo
        run: |
          git config user.name "nteract-release-bot"
          git config user.email "release-bot@nteract.io"

      - name: Assemble channel slice into distribution checkout
        run: |
          # Assembly script only touches plugins/<channel>/ + its
          # marketplace.json entry. The other channel's slice is left
          # as-is, so serial runs compose.
          ./scripts/assemble-plugin-dist.sh \
            --channel "${{ inputs.publish_plugin_channel }}" \
            --binaries-dir plugin-binaries \
            --out-dir plugin-dist-repo

      - name: Commit, tag, and push (with pull-rebase retry)
        working-directory: plugin-dist-repo
        env:
          VERSION: ${{ needs.compute-version.outputs.version }}
          CHANNEL: ${{ inputs.publish_plugin_channel }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "no changes for ${CHANNEL} slice; skipping push and tag"
            exit 0
          fi

          git commit -m "Release v${VERSION} (${CHANNEL})" \
            -m "Generated from nteract/desktop@${GITHUB_SHA}" \
            -m "Do not hand-edit — regenerated on every release."
          git tag -f "v${VERSION}"

          # Pull-rebase-push retry handles a same-minute race between
          # stable and nightly. Our commit only touches its own channel's
          # paths, so rebase onto the other channel's commit is a
          # non-overlapping fast-forward in practice.
          for attempt in 1 2 3; do
            if git push origin HEAD:main && git push origin "v${VERSION}"; then
              echo "published on attempt ${attempt}"
              exit 0
            fi
            echo "push failed on attempt ${attempt}, rebasing..."
            git fetch origin main
            git rebase origin/main || {
              echo "rebase conflict — abort, leave the distribution repo consistent" >&2
              git rebase --abort
              exit 1
            }
          done
          echo "publish failed after 3 attempts" >&2
          exit 1

  prerelease:
    name: ${{ inputs.release_title }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      id-token: write
    needs:
      [
        compute-version,
        build-linux,
        build-macos,
        build-notebook-macos-arm64,
        build-notebook-macos-x64,
        build-notebook-windows-x64,
        build-notebook-linux-x64,
        smoke-fedora-appimage,
        build-python-wheels,
        build-nteract-package,
        build-dx-package,
      ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/

      - name: Generate changelog
        id: changelog
        run: |
          if [ "${{ inputs.github_release_prerelease }}" = "false" ]; then
            # Stable release: generate changelog since the previous stable tag.
            # We can't use --latest because nightly tags between stable releases
            # cause git-cliff to pick a nightly→stable range with zero commits.
            # Instead, find the previous stable tag and use an explicit range.
            PREV_STABLE=$(git tag -l 'v*-stable.*' --sort=-creatordate | head -1)
            if [ -n "$PREV_STABLE" ]; then
              CHANGELOG=$(git-cliff "${PREV_STABLE}..HEAD" --ignore-tags ".*nightly.*" --strip header 2>/dev/null || echo "")
            else
              CHANGELOG=$(git-cliff --strip header 2>/dev/null || echo "")
            fi
          else
            # Nightly: changelog from all unreleased commits since last tag
            CHANGELOG=$(git-cliff --unreleased --strip header 2>/dev/null || echo "")
          fi
          if [ -z "$CHANGELOG" ] || [ "$CHANGELOG" = "" ]; then
            CHANGELOG="No user-facing changes in this release."
          fi
          echo "$CHANGELOG" > changelog-section.md

      - name: Download Linux executables
        uses: actions/download-artifact@v4
        with:
          name: runt-linux-executables
          path: ./executables

      - name: Download macOS executables
        uses: actions/download-artifact@v4
        with:
          name: runt-macos-executables
          path: ./executables

      - name: Download macOS ARM64 notebook
        uses: actions/download-artifact@v4
        with:
          name: nteract-macos-arm64
          path: ./notebook-macos-arm64

      - name: Download macOS x64 notebook
        uses: actions/download-artifact@v4
        with:
          name: nteract-macos-x64
          path: ./notebook-macos-x64

      - name: Download Windows x64 notebook
        uses: actions/download-artifact@v4
        with:
          name: nteract-windows-x64
          path: ./notebook-windows-x64

      - name: Download Linux x64 notebook
        uses: actions/download-artifact@v4
        with:
          name: nteract-linux-x64
          path: ./notebook-linux-x64

      - name: Report downloaded release artifact sizes
        run: |
          echo "Downloaded artifact directories:"
          du -sh \
            executables \
            notebook-macos-arm64 \
            notebook-macos-x64 \
            notebook-windows-x64 \
            notebook-linux-x64
          echo ""
          echo "Downloaded artifact files:"
          find \
            executables \
            notebook-macos-arm64 \
            notebook-macos-x64 \
            notebook-windows-x64 \
            notebook-linux-x64 \
            -type f -printf "%12s  %p\n" | sort -nr

      - name: Prepare release assets
        run: |
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          CLI_NAME="runt"
          DAEMON_NAME="runtimed"
          MCP_NAME="nteract-mcp"
          if [ "$CHANNEL" = "nightly" ]; then
            CLI_NAME="runt-nightly"
            DAEMON_NAME="runtimed-nightly"
            MCP_NAME="nteract-mcp-nightly"
          fi
          mkdir -p release-assets
          # CLI binaries
          cp executables/runt-linux-x64 "release-assets/${CLI_NAME}-linux-x64"
          cp executables/runtimed-linux-x64 "release-assets/${DAEMON_NAME}-linux-x64"
          cp executables/nteract-mcp-linux-x64 "release-assets/${MCP_NAME}-linux-x64"
          cp executables/runt-darwin-arm64 "release-assets/${CLI_NAME}-darwin-arm64"
          cp executables/runt-darwin-x64 "release-assets/${CLI_NAME}-darwin-x64"
          sed \
            -e "s/^DEFAULT_CHANNEL=\"stable\"$/DEFAULT_CHANNEL=\"${CHANNEL}\"/" \
            -e "s/^DEFAULT_TAG=\"\"$/DEFAULT_TAG=\"v${{ needs.compute-version.outputs.version }}\"/" \
            scripts/install-linux-release > release-assets/install-linux-release
          chmod 0755 release-assets/install-linux-release
          grep -Fqx "DEFAULT_CHANNEL=\"${CHANNEL}\"" release-assets/install-linux-release
          grep -Fqx "DEFAULT_TAG=\"v${{ needs.compute-version.outputs.version }}\"" release-assets/install-linux-release
          # Notebook installers
          cp "notebook-macos-arm64/nteract-${CHANNEL}-darwin-arm64.dmg" release-assets/
          cp "notebook-macos-x64/nteract-${CHANNEL}-darwin-x64.dmg" release-assets/
          cp "notebook-windows-x64/nteract-${CHANNEL}-windows-x64.exe" release-assets/
          cp "notebook-linux-x64/nteract-${CHANNEL}-linux-x64.AppImage" release-assets/
          # Updater bundles + signatures
          cp "notebook-macos-arm64/nteract-${CHANNEL}-darwin-arm64.app.tar.gz" release-assets/
          cp "notebook-macos-arm64/nteract-${CHANNEL}-darwin-arm64.app.tar.gz.sig" release-assets/
          cp "notebook-macos-x64/nteract-${CHANNEL}-darwin-x64.app.tar.gz" release-assets/
          cp "notebook-macos-x64/nteract-${CHANNEL}-darwin-x64.app.tar.gz.sig" release-assets/
          cp "notebook-windows-x64/nteract-${CHANNEL}-windows-x64.exe.sig" release-assets/
          cp "notebook-linux-x64/nteract-${CHANNEL}-linux-x64.AppImage.sig" release-assets/ 2>/dev/null || true

      - name: Generate updater manifest (latest.json)
        env:
          VERSION: ${{ needs.compute-version.outputs.version }}
          TAG_NAME: v${{ needs.compute-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          RELEASE_BASE="https://github.com/${REPO}/releases/download/${TAG_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          require_file() {
            if [ ! -f "$1" ]; then
              echo "::error::Missing required updater asset: $1"
              exit 1
            fi
          }

          require_sig() {
            if [ ! -s "$1" ]; then
              echo "::error::Missing or empty updater signature: $1"
              exit 1
            fi
          }

          read_sig() { cat "$1"; }

          require_file "release-assets/nteract-${CHANNEL}-darwin-arm64.app.tar.gz"
          require_file "release-assets/nteract-${CHANNEL}-darwin-x64.app.tar.gz"
          require_file "release-assets/nteract-${CHANNEL}-linux-x64.AppImage"
          require_file "release-assets/nteract-${CHANNEL}-windows-x64.exe"
          require_file "release-assets/install-linux-release"
          require_sig "release-assets/nteract-${CHANNEL}-darwin-arm64.app.tar.gz.sig"
          require_sig "release-assets/nteract-${CHANNEL}-darwin-x64.app.tar.gz.sig"
          require_sig "release-assets/nteract-${CHANNEL}-linux-x64.AppImage.sig"
          require_sig "release-assets/nteract-${CHANNEL}-windows-x64.exe.sig"

          SIG_DARWIN_ARM64=$(read_sig "release-assets/nteract-${CHANNEL}-darwin-arm64.app.tar.gz.sig")
          SIG_DARWIN_X64=$(read_sig "release-assets/nteract-${CHANNEL}-darwin-x64.app.tar.gz.sig")
          SIG_LINUX_X64=$(read_sig "release-assets/nteract-${CHANNEL}-linux-x64.AppImage.sig")
          SIG_WINDOWS_X64=$(read_sig "release-assets/nteract-${CHANNEL}-windows-x64.exe.sig")

          jq -n \
            --arg version "$VERSION" \
            --arg notes "${{ inputs.manifest_notes_prefix }} $TAG_NAME" \
            --arg pub_date "$PUB_DATE" \
            --arg sig_darwin_arm64 "$SIG_DARWIN_ARM64" \
            --arg url_darwin_arm64 "$RELEASE_BASE/nteract-${CHANNEL}-darwin-arm64.app.tar.gz" \
            --arg sig_darwin_x64 "$SIG_DARWIN_X64" \
            --arg url_darwin_x64 "$RELEASE_BASE/nteract-${CHANNEL}-darwin-x64.app.tar.gz" \
            --arg sig_linux_x64 "$SIG_LINUX_X64" \
            --arg url_linux_x64 "$RELEASE_BASE/nteract-${CHANNEL}-linux-x64.AppImage" \
            --arg sig_windows_x64 "$SIG_WINDOWS_X64" \
            --arg url_windows_x64 "$RELEASE_BASE/nteract-${CHANNEL}-windows-x64.exe" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $sig_darwin_arm64, url: $url_darwin_arm64 },
                "darwin-x86_64": { signature: $sig_darwin_x64, url: $url_darwin_x64 },
                "linux-x86_64": { signature: $sig_linux_x64, url: $url_linux_x64 },
                "windows-x86_64": { signature: $sig_windows_x64, url: $url_windows_x64 }
              }
            }' > release-assets/latest.json

          echo "Generated latest.json:"
          cat release-assets/latest.json

      - name: Download Python wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: ./wheels
          merge-multiple: true

      - name: Download nteract dist
        uses: actions/download-artifact@v4
        with:
          name: nteract-dist
          path: ./nteract-dist

      - name: Download dx dist
        uses: actions/download-artifact@v4
        with:
          name: dx-dist
          path: ./dx-dist

      - name: Report final release asset sizes
        run: |
          echo "Release asset directories:"
          du -sh release-assets wheels nteract-dist dx-dist
          echo ""
          echo "Release asset files:"
          find release-assets wheels nteract-dist dx-dist -type f -printf "%12s  %p\n" | sort -nr

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # PyPI publishes are gated to pre-releases (nightly) only. Stable
      # publishes are paused while the `runtimed` / `nteract` / `dx`
      # library surface is still in flux — see #2217. Pre-releases carry
      # unique per-minute versions (e.g. 2.2.1a202604150406) so there's
      # no collision risk.
      #
      # Trusted-publisher config on PyPI must include an entry for this
      # workflow (`release-common.yml`) per published project. Missing
      # entries surface here as "403 Invalid API Token … not valid for
      # project 'X'". Fix at https://pypi.org/manage/project/{name}/settings/publishing/.

      - name: Publish runtimed to PyPI
        if: inputs.github_release_prerelease
        run: uv publish --trusted-publishing always ./wheels/*.whl

      - name: Publish nteract to PyPI
        if: inputs.github_release_prerelease
        run: uv publish --trusted-publishing always ./nteract-dist/*

      - name: Publish dx to PyPI
        if: inputs.github_release_prerelease
        run: uv publish --trusted-publishing always ./dx-dist/*

      - name: Generate release body
        env:
          VERSION_SUFFIX: ${{ inputs.version_suffix }}
          COMMIT_SHA: ${{ github.sha }}
          RELEASE_INTRO: ${{ inputs.release_intro }}
        run: |
          CLI_NAME="runt"
          DAEMON_NAME="runtimed"
          MCP_NAME="nteract-mcp"
          if [ "$VERSION_SUFFIX" = "nightly" ]; then
            CLI_NAME="runt-nightly"
            DAEMON_NAME="runtimed-nightly"
            MCP_NAME="nteract-mcp-nightly"
          fi
          {
            echo "$RELEASE_INTRO"
            echo ''
            echo "## What's Changed"
            echo ''
            cat changelog-section.md
            echo ''
            echo '---'
            echo ''
            echo "**Commit:** \`${COMMIT_SHA}\`"
            echo ''
            echo '## nteract (desktop app)'
            echo ''
            echo '| Platform | Architecture | Download |'
            echo '|----------|--------------|----------|'
            echo "| macOS | ARM64 (Apple Silicon) | \`nteract-${VERSION_SUFFIX}-darwin-arm64.dmg\` |"
            echo "| macOS | x64 (Intel) | \`nteract-${VERSION_SUFFIX}-darwin-x64.dmg\` |"
            echo "| Windows | x64 | \`nteract-${VERSION_SUFFIX}-windows-x64.exe\` |"
            echo "| Linux | x64 | \`nteract-${VERSION_SUFFIX}-linux-x64.AppImage\` |"
            echo ''
            echo "macOS and Windows builds are signed. macOS builds are also notarized. Linux AppImage: \`chmod +x\` and run. DEB/RPM packages are not currently supported because runtimed is a per-user daemon managed by the app and CLI, not by system package-manager scripts."
            echo ''
            echo "For Linux shell installs, download \`install-linux-release\` from this release or run:"
            echo ''
            echo '```bash'
            echo 'curl -fsSL https://sh.nteract.io | bash'
            echo '```'
            echo ''
            echo 'This release includes auto-update support. Existing installations will be notified of this update automatically.'
            echo ''
            echo "## ${CLI_NAME} (CLI)"
            echo ''
            echo 'Also bundled inside the desktop app. Standalone binaries:'
            echo ''
            echo '| Platform | Architecture | Download |'
            echo '|----------|--------------|----------|'
            echo "| Linux | x64 | \`${CLI_NAME}-linux-x64\` |"
            echo "| Linux | x64 | \`${DAEMON_NAME}-linux-x64\` |"
            echo "| Linux | x64 | \`${MCP_NAME}-linux-x64\` |"
            echo "| macOS | ARM64 | \`${CLI_NAME}-darwin-arm64\` |"
            echo "| macOS | x64 (Intel) | \`${CLI_NAME}-darwin-x64\` |"
            echo ''
            echo '## runtimed (Python — macOS, Linux, Windows)'
            echo ''
            echo '```bash'
            echo 'pip install runtimed --pre'
            echo '```'
            echo ''
            echo '## dx (Python kernel-side helpers)'
            echo ''
            echo '```bash'
            echo 'pip install dx --pre'
            echo '```'
          } > release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.compute-version.outputs.version }}
          name: nteract v${{ needs.compute-version.outputs.version }}
          body_path: release-body.md
          draft: false
          prerelease: ${{ inputs.github_release_prerelease }}
          files: |
            ./release-assets/runt*-linux-x64
            ./release-assets/nteract-mcp*-linux-x64
            ./release-assets/runt*-darwin-arm64
            ./release-assets/runt*-darwin-x64
            ./release-assets/install-linux-release
            ./release-assets/nteract-${{ inputs.version_suffix }}-linux-x64.AppImage
            ./release-assets/nteract-${{ inputs.version_suffix }}-linux-x64.AppImage.sig
            ./release-assets/nteract-${{ inputs.version_suffix }}-darwin-arm64.dmg
            ./release-assets/nteract-${{ inputs.version_suffix }}-darwin-arm64.app.tar.gz
            ./release-assets/nteract-${{ inputs.version_suffix }}-darwin-arm64.app.tar.gz.sig
            ./release-assets/nteract-${{ inputs.version_suffix }}-darwin-x64.dmg
            ./release-assets/nteract-${{ inputs.version_suffix }}-darwin-x64.app.tar.gz
            ./release-assets/nteract-${{ inputs.version_suffix }}-darwin-x64.app.tar.gz.sig
            ./release-assets/nteract-${{ inputs.version_suffix }}-windows-x64.exe
            ./release-assets/nteract-${{ inputs.version_suffix }}-windows-x64.exe.sig
            ./release-assets/latest.json
            ./wheels/*.whl
            ./nteract-dist/*
            ./dx-dist/*

      - name: Update ${{ inputs.updater_channel_tag }} updater channel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.updater_channel_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG=""
          fi

          # Ensure the rolling updater release exists, then update latest.json
          gh release create "${{ inputs.updater_channel_tag }}" \
            --title "${{ inputs.updater_channel_title }}" \
            --notes "${{ inputs.updater_channel_notes }}" \
            ${PRERELEASE_FLAG} \
            --latest=false 2>/dev/null || true

          gh release edit "${{ inputs.updater_channel_tag }}" --prerelease=${{ inputs.updater_channel_prerelease }} --latest=false >/dev/null 2>&1 || true

          gh release upload "${{ inputs.updater_channel_tag }}" release-assets/latest.json --clobber

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ needs.compute-version.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "No Discord webhook configured, skipping notification"
            exit 0
          fi

          curl -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"${{ inputs.release_title }} succeeded\",
              \"description\": \"Version \`v${VERSION}\` published successfully\",
              \"url\": \"$RUN_URL\",
              \"color\": 3066993
            }]
          }" "$DISCORD_WEBHOOK"
