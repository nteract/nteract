name: Release Pipeline (Reusable)

on:
  workflow_call:
    inputs:
      release_title:
        description: Display name for the release job
        required: true
        type: string
      version_suffix:
        description: Suffix appended to version before short SHA
        required: true
        type: string
      manifest_notes_prefix:
        description: Prefix for latest.json notes field
        required: true
        type: string
      release_intro:
        description: Intro sentence in the GitHub release body
        required: true
        type: string
      github_release_prerelease:
        description: Whether the GitHub release is marked prerelease
        required: true
        type: boolean
      updater_channel_tag:
        description: Rolling release tag that stores updater latest.json
        required: true
        type: string
      updater_channel_title:
        description: Rolling updater channel release title
        required: true
        type: string
      updater_channel_notes:
        description: Rolling updater channel release notes
        required: true
        type: string
      updater_channel_prerelease:
        description: Whether the updater channel release is prerelease
        required: true
        type: boolean
      publish_plugin_channel:
        description: stable or nightly — selects which plugin slice (plugins/nteract or plugins/nightly) is assembled. Leave empty to skip plugin publish.
        required: false
        type: string
        default: ""

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  RUNT_BUILD_CHANNEL: ${{ inputs.version_suffix }}
  NTERACT_BUILD_GIT_HASH: ${{ github.sha }}

jobs:
  compute-version:
    name: Compute Version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      timestamp: ${{ steps.version.outputs.TIMESTAMP }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Compute version
        id: version
        run: |
          CURRENT_VERSION=$(grep '^version' crates/runt/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TIMESTAMP=$(date -u +%Y%m%d%H%M)
          VERSION="${CURRENT_VERSION}-${{ inputs.version_suffix }}.${TIMESTAMP}"
          echo "Setting version to: ${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_OUTPUT"

  build-wasm:
    name: Build WASM artifacts
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wasm-build"

      - uses: ./.github/actions/build-runtime-artifacts

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          retention-days: 1
          path: |
            apps/notebook/src/wasm/runtimed-wasm/
            crates/sift-wasm/pkg/
            packages/sift/public/wasm/
            crates/runt-mcp/assets/plugins/
            apps/notebook/src/renderer-plugins/

  build-linux:
    name: Build Linux Executables
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: [compute-version, build-wasm]
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-release"

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Warm up sccache
        uses: ./.github/actions/sccache-warmup

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts

      - uses: ./.github/actions/build-runtime-artifacts
        with:
          skip-wasm: true

      - name: Set version in Cargo.toml
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          echo "Setting version to: ${VERSION}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" crates/runt/Cargo.toml
          sed -i "s/^version = .*/version = \"${VERSION}\"/" crates/runtimed/Cargo.toml

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - name: Build MCP output widget
        run: pnpm --filter nteract-mcp-app install && vp run nteract-mcp-app#build

      - name: Build for Linux x64
        run: cargo build --release --target x86_64-unknown-linux-gnu -p runt -p runtimed -p nteract-mcp

      - name: Rename binaries
        run: |
          cp target/x86_64-unknown-linux-gnu/release/runt runt-linux-x64
          cp target/x86_64-unknown-linux-gnu/release/runtimed runtimed-linux-x64
          cp target/x86_64-unknown-linux-gnu/release/nteract-mcp nteract-mcp-linux-x64
          chmod +x runt-linux-x64
          chmod +x runtimed-linux-x64
          chmod +x nteract-mcp-linux-x64

      - name: Upload Linux executables
        uses: actions/upload-artifact@v4
        with:
          name: runt-linux-executables
          path: |
            runt-linux-x64
            runtimed-linux-x64
            nteract-mcp-linux-x64

  build-macos:
    name: Build macOS Executables
    runs-on: macos-14-xlarge
    needs: [compute-version, build-wasm]
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Install cross-compilation targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-release"

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Warm up sccache
        uses: ./.github/actions/sccache-warmup

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts

      - uses: ./.github/actions/build-runtime-artifacts
        with:
          skip-wasm: true

      - name: Set version in Cargo.toml
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          echo "Setting version to: ${VERSION}"
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" crates/runt/Cargo.toml
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" crates/runtimed/Cargo.toml

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - name: Build MCP output widget
        run: pnpm --filter nteract-mcp-app install && vp run nteract-mcp-app#build

      - name: Build for macOS ARM64
        run: cargo build --release --target aarch64-apple-darwin -p runt

      - name: Build for macOS x64
        run: cargo build --release --target x86_64-apple-darwin -p runt

      - name: Rename binaries
        run: |
          cp target/aarch64-apple-darwin/release/runt runt-darwin-arm64
          chmod +x runt-darwin-arm64
          cp target/x86_64-apple-darwin/release/runt runt-darwin-x64
          chmod +x runt-darwin-x64

      - name: Upload macOS executables
        uses: actions/upload-artifact@v4
        with:
          name: runt-macos-executables
          path: |
            runt-darwin-arm64
            runt-darwin-x64

  build-notebook-macos-arm64:
    name: Build macOS ARM64 Notebook
    runs-on: macos-14-xlarge
    needs: [compute-version, build-wasm]
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-notebook-arm64"

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Warm up sccache
        uses: ./.github/actions/sccache-warmup

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts

      - uses: ./.github/actions/build-runtime-artifacts
        with:
          skip-wasm: true

      - name: Build frontend
        run: pnpm build

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --no-confirm --locked --force

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No signing certificate configured, skipping"
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/certificate.p12"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Set version in tauri.conf.json
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          echo "Setting version to: ${VERSION}"
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          if [ "$CHANNEL" = "nightly" ]; then
            PRODUCT_NAME="nteract Nightly"
            BUNDLE_ID="org.nteract.desktop.nightly"
          else
            PRODUCT_NAME="nteract"
            BUNDLE_ID="org.nteract.desktop"
          fi
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" crates/notebook/tauri.conf.json
          sed -i '' "s/\"productName\": \"[^\"]*\"/\"productName\": \"${PRODUCT_NAME}\"/" crates/notebook/tauri.conf.json
          sed -i '' "s/\"identifier\": \"[^\"]*\"/\"identifier\": \"${BUNDLE_ID}\"/" crates/notebook/tauri.conf.json
          sed -i '' "s#https://github.com/nteract/desktop/releases/download/stable-latest/latest.json#https://github.com/nteract/desktop/releases/download/${{ inputs.updater_channel_tag }}/latest.json#" crates/notebook/tauri.conf.json
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" crates/runt/Cargo.toml
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" crates/runtimed/Cargo.toml

      - name: Generate Icons
        run: |
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          ICON_SOURCE="crates/notebook/icons/source.png"
          if [ "$CHANNEL" = "nightly" ] && [ -f "crates/notebook/icons/source-nightly.png" ]; then
            ICON_SOURCE="crates/notebook/icons/source-nightly.png"
          fi
          cargo xtask icons "$ICON_SOURCE"

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - name: Build MCP output widget
        run: pnpm --filter nteract-mcp-app install && vp run nteract-mcp-app#build

      - name: Build external binaries
        run: |
          cargo build --release -p runtimed -p runt -p nteract-mcp
          TARGET=$(rustc --print host-tuple)
          mkdir -p crates/notebook/binaries
          cp target/release/runtimed "crates/notebook/binaries/runtimed-$TARGET"
          cp target/release/runt "crates/notebook/binaries/runt-$TARGET"
          cp target/release/nteract-mcp "crates/notebook/binaries/nteract-mcp-$TARGET"

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/notebook
          args: --bundles app,dmg --config '{"build":{"beforeBuildCommand":""}}'
          includeUpdaterJson: false

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"

          shopt -s nullglob
          DMG_BINARIES=(target/release/bundle/dmg/*.dmg)
          TAR_GZ_BINARIES=(target/release/bundle/macos/*.tar.gz)
          TAR_GZ_SIG_BINARIES=(target/release/bundle/macos/*.tar.gz.sig)
          shopt -u nullglob

          if [ ${#DMG_BINARIES[@]} -eq 0 ]; then
            echo "::error::No macOS installer (.dmg) found in target/release/bundle/dmg"
            exit 1
          fi

          cp "${DMG_BINARIES[0]}" "artifacts/nteract-${CHANNEL}-darwin-arm64.dmg"

          if [ ${#TAR_GZ_BINARIES[@]} -eq 0 ]; then
            echo "::error::No macOS updater bundle (.app.tar.gz) found in target/release/bundle/macos"
            exit 1
          fi
          if [ ${#TAR_GZ_SIG_BINARIES[@]} -eq 0 ]; then
            echo "::error::No macOS updater signature (.app.tar.gz.sig) found in target/release/bundle/macos"
            exit 1
          fi

          cp "${TAR_GZ_BINARIES[0]}" "artifacts/nteract-${CHANNEL}-darwin-arm64.app.tar.gz"
          cp "${TAR_GZ_SIG_BINARIES[0]}" "artifacts/nteract-${CHANNEL}-darwin-arm64.app.tar.gz.sig"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nteract-macos-arm64
          path: artifacts/

      - name: Upload raw nteract-mcp binary for plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: plugin-nteract-mcp-aarch64-apple-darwin
          path: crates/notebook/binaries/nteract-mcp-aarch64-apple-darwin
          if-no-files-found: error

  build-notebook-macos-x64:
    name: Build macOS x64 Notebook
    runs-on: macos-14-xlarge
    needs: [compute-version, build-wasm]
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Install cross-compilation target
        run: rustup target add x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-notebook-x64"

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Warm up sccache
        uses: ./.github/actions/sccache-warmup

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-artifacts

      - uses: ./.github/actions/build-runtime-artifacts
        with:
          skip-wasm: true

      - name: Build frontend
        run: pnpm build

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --no-confirm --locked --force

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No signing certificate configured, skipping"
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/certificate.p12"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Set version in tauri.conf.json
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          echo "Setting version to: ${VERSION}"
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          if [ "$CHANNEL" = "nightly" ]; then
            PRODUCT_NAME="nteract Nightly"
            BUNDLE_ID="org.nteract.desktop.nightly"
          else
            PRODUCT_NAME="nteract"
            BUNDLE_ID="org.nteract.desktop"
          fi
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" crates/notebook/tauri.conf.json
          sed -i '' "s/\"productName\": \"[^\"]*\"/\"productName\": \"${PRODUCT_NAME}\"/" crates/notebook/tauri.conf.json
          sed -i '' "s/\"identifier\": \"[^\"]*\"/\"identifier\": \"${BUNDLE_ID}\"/" crates/notebook/tauri.conf.json
          sed -i '' "s#https://github.com/nteract/desktop/releases/download/stable-latest/latest.json#https://github.com/nteract/desktop/releases/download/${{ inputs.updater_channel_tag }}/latest.json#" crates/notebook/tauri.conf.json
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" crates/runt/Cargo.toml
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" crates/runtimed/Cargo.toml

      - name: Generate Icons
        run: |
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          ICON_SOURCE="crates/notebook/icons/source.png"
          if [ "$CHANNEL" = "nightly" ] && [ -f "crates/notebook/icons/source-nightly.png" ]; then
            ICON_SOURCE="crates/notebook/icons/source-nightly.png"
          fi
          cargo xtask icons "$ICON_SOURCE"

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - name: Build MCP output widget
        run: pnpm --filter nteract-mcp-app install && vp run nteract-mcp-app#build

      - name: Build external binaries
        run: |
          cargo build --release --target x86_64-apple-darwin -p runtimed -p runt -p nteract-mcp
          TARGET="x86_64-apple-darwin"
          mkdir -p crates/notebook/binaries
          cp target/x86_64-apple-darwin/release/runtimed "crates/notebook/binaries/runtimed-$TARGET"
          cp target/x86_64-apple-darwin/release/runt "crates/notebook/binaries/runt-$TARGET"
          cp target/x86_64-apple-darwin/release/nteract-mcp "crates/notebook/binaries/nteract-mcp-$TARGET"

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/notebook
          args: --target x86_64-apple-darwin --bundles app,dmg --config '{"build":{"beforeBuildCommand":""}}'
          includeUpdaterJson: false

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
