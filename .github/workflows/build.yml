name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Detect source changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      source_changed: ${{ steps.filter.outputs.source }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          fetch-depth: 0

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            source:
              - ".github/workflows/**"
              - "apps/**"
              - "bin/**"
              - "crates/**"
              - "e2e/**"
              - "!e2e/*.md"
              - "python/**"
              - "scripts/**"
              - "src/**"
              - "packages/**"
              - "plugins/**"
              - "Cargo.toml"
              - "Cargo.lock"
              - "rust-toolchain.toml"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "vite.config.ts"
              - "components.json"
              - "tailwind.config.js"
              - "tsconfig.json"
              - "vitest.config.ts"

  lint:
    name: Lint & Format
    needs: [changes]
    if: needs.changes.outputs.source_changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Check Rust formatting
        run: cargo fmt --check

      - uses: voidzero-dev/setup-vp@v1
        with:
          run-install: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Check (format + lint)
        run: vp check

      - name: Lint GitHub Actions workflows
        # Install the binary directly rather than via raven-actions/actionlint@v2,
        # which falls back to `npm install` in the repo root on cache miss and
        # chokes on the pnpm `catalog:` protocol in package.json.
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  nsis-bootstrap:
    name: NSIS Bootstrap Syntax
    needs: [changes]
    if: needs.changes.outputs.source_changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install NSIS
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nsis

      - name: Compile bootstrap hook fixture
        run: |
          cd crates/notebook/nsis
          makensis -V4 validate-bootstrap.nsi

  windows-clippy:
    name: Windows (clippy)
    needs: [changes]
    if: needs.changes.outputs.source_changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-cross

      - name: Install mingw-w64 and add Windows GNU target
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-mingw-w64-x86-64 nasm
          rustup target add x86_64-pc-windows-gnu

      # Build wasm + renderer plugins (gitignored; runtimed embeds them)
      - uses: ./.github/actions/build-runtime-artifacts

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - run: pnpm --filter nteract-mcp-app install --frozen-lockfile && pnpm exec vp run nteract-mcp-app#build

      - name: Clippy (Windows cross-check)
        # runtimed-node stays excluded here: napi's build script needs libnode.dll
        # for Windows targets, which the Linux cross-compiler doesn't carry. Linux
        # and matrix clippy steps still cover runtimed-node natively.
        run: cargo clippy --target x86_64-pc-windows-gnu --workspace --exclude notebook --exclude runtimed-wasm --exclude sift-wasm --exclude runtimed-py --exclude runtimed-node --all-targets -- -D warnings

  wasm-deno:
    name: WASM + Deno Tests
    needs: [changes]
    if: needs.changes.outputs.source_changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-wasm

      # Build wasm + renderer plugins. The artifacts are gitignored and
      # rebuilt fresh here; downstream verify-plugins + Deno tests both
      # exercise the freshly-built copies.
      - uses: ./.github/actions/build-runtime-artifacts

      - name: Verify renderer plugins match wasm artifacts
        # Coherence check, not byte-reproducibility. Catches #2048-style drift
        # where the wasm was rebuilt but the plugin JS bundle was not (or vice
        # versa). Runs against the freshly-built artifacts produced above.
        run: cargo xtask verify-plugins

      - name: Install Deno
        uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: "2.4"

      - name: Run runtimed-wasm Deno tests
        run: deno test --allow-read --allow-env --no-check crates/runtimed-wasm/tests/

  build-ui:
    name: Build shared UI artifacts
    needs: [changes]
    if: needs.changes.outputs.source_changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-build-ui

      # The notebook Vite build imports from apps/notebook/src/renderer-plugins/
      # and apps/notebook/src/wasm/runtimed-wasm/, both gitignored. Rebuild
      # before pnpm build.
      - uses: ./.github/actions/build-runtime-artifacts

      - name: Build UIs
        run: |
          pnpm --dir apps/notebook build
          pnpm --dir apps/elements build

      - name: Upload UI build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ui-build-dist
          path: |
            apps/notebook/dist/
          retention-days: 1

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wasm-artifacts
          retention-days: 1
          path: |
            apps/notebook/src/wasm/runtimed-wasm/
            crates/sift-wasm/pkg/
            packages/sift/public/wasm/
            crates/runt-mcp/assets/plugins/
            apps/notebook/src/renderer-plugins/

  js-tests:
    name: JS Tests & Benchmarks
    needs: [changes]
    if: needs.changes.outputs.source_changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-js-tests

      # Build wasm + renderer plugins (gitignored; tests import them)
      - uses: ./.github/actions/build-runtime-artifacts

      - name: Run JS tests
        run: vp test run

      - name: Run sift tests
        run: pnpm --filter @nteract/sift test

      - name: Run JS benchmarks
        run: vp test bench --run apps/notebook/src/lib/__tests__/

  browser-e2e:
    name: Browser E2E (Playwright)
    needs: [changes]
    if: needs.changes.outputs.source_changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-browser-e2e

      # Build wasm + renderer plugins (gitignored; Vite imports them).
      - uses: ./.github/actions/build-runtime-artifacts

      - name: Install Playwright Chromium
        run: pnpm --filter notebook-ui exec playwright install --with-deps chromium

      - name: Run browser E2E
        run: pnpm --filter notebook-ui test:e2e:browser -- --project=chromium
        env:
          NTERACT_BROWSER_E2E_READY_TIMEOUT_MS: 300000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-e2e-playwright-report
          path: |
            apps/notebook/playwright-report/
            apps/notebook/test-results/
          retention-days: 7

  build-linux:
    name: Linux (release artifacts)
    needs: [changes, build-ui]
    if: needs.changes.outputs.source_changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Download UI build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ui-build-dist
          path: apps/notebook/dist

      - name: Download WASM artifacts
        uses: actions/download-artifact@v8
        with:
          name: wasm-artifacts

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libxdo-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-release

      - uses: ./.github/actions/build-runtime-artifacts
        with:
          skip-wasm: true

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - run: pnpm --filter nteract-mcp-app install --frozen-lockfile && pnpm exec vp run nteract-mcp-app#build

      - name: Build external binaries
        shell: bash
        run: |
          cargo build --release -p runtimed -p runt -p nteract-mcp
          TARGET=$(rustc --print host-tuple)
          mkdir -p crates/notebook/binaries
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp target/release/runtimed.exe "crates/notebook/binaries/runtimed-$TARGET.exe"
            cp target/release/runt.exe "crates/notebook/binaries/runt-$TARGET.exe"
            cp target/release/nteract-mcp.exe "crates/notebook/binaries/nteract-mcp-$TARGET.exe"
          else
            cp target/release/runtimed "crates/notebook/binaries/runtimed-$TARGET"
            cp target/release/runt "crates/notebook/binaries/runt-$TARGET"
            cp target/release/nteract-mcp "crates/notebook/binaries/nteract-mcp-$TARGET"
          fi

      - name: Check tool caches are up to date
        run: cargo xtask sync-tool-cache --check

      - name: Clippy (notebook crate)
        run: cargo clippy -p notebook --all-targets -- -D warnings

      - name: Install tauri-cli
        uses: ./.github/actions/install-tauri-cli

      - name: Upload Linux Rust binaries
        uses: actions/upload-artifact@v7
        with:
          name: linux-rust-binaries
          path: |
            target/release/runtimed
            target/release/runt
            target/release/nteract-mcp
            crates/notebook/binaries/runtimed-*
            crates/notebook/binaries/runt-*
            crates/notebook/binaries/nteract-mcp-*
          retention-days: 1

      - name: Build Tauri E2E app
        run: cd crates/notebook && cargo tauri build --ci --no-bundle --features e2e-webdriver --config '{"build":{"beforeBuildCommand":""}}'

      - name: Stage E2E artifacts
        run: |
          mkdir -p target/release/binaries
          cp crates/notebook/binaries/runtimed-* target/release/binaries/
          cp crates/notebook/binaries/runt-* target/release/binaries/
          cp crates/notebook/binaries/nteract-mcp-* target/release/binaries/

      - name: Upload E2E app
        uses: actions/upload-artifact@v7
        with:
          name: e2e-app-linux
          path: |
            target/release/notebook
            target/release/binaries/
          retention-days: 1

      - name: Test notebook crate
        run: cargo test -p notebook --verbose

  clippy-and-tests:
    name: Clippy & Tests (Linux)
    needs: [changes]
    if: needs.changes.outputs.source_changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libxdo-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-clippy

      # Build wasm + renderer plugins (gitignored; runtimed embeds them)
      - uses: ./.github/actions/build-runtime-artifacts

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - run: pnpm --filter nteract-mcp-app install --frozen-lockfile && pnpm exec vp run nteract-mcp-app#build

      # Excludes: notebook (needs bundled binaries, checked in build-linux),
      # runtimed-wasm (needs wasm-pack, tested in wasm-deno),
      # runtimed-py (needs Python/maturin, tested in runtimed-py-integration).
      - name: Clippy
        run: cargo clippy --workspace --exclude notebook --exclude runtimed-wasm --exclude sift-wasm --exclude runtimed-py --all-targets -- -D warnings

      - name: Dependency budget check
        run: cargo xtask check-dep-budget

      - name: Run tests
        run: cargo test --workspace --exclude notebook --exclude runtimed-wasm --exclude sift-wasm --exclude runtimed-py --exclude runtimed-node --verbose

      - name: Run nteract-mcp tests
        run: cargo test -p nteract-mcp --verbose

      - name: Build runtimed-node N-API package
        run: pnpm --dir packages/runtimed-node build:debug

      - name: Test runtimed-node Arrow IPC native integration
        run: vp test run packages/runtimed-node/tests/arrow-ipc.test.ts
        env:
          RUNTIMED_NODE_NATIVE_INTEGRATION: "1"

      - name: Smoke test runtimed-node package
        run: pnpm --dir packages/runtimed-node smoke

      - name: Check runtimed-node native package tarball
        run: pnpm --dir packages/runtimed-node pack:platform:dry-run

      - name: Check runtimed-node package tarball
        run: pnpm --dir packages/runtimed-node pack:dry-run

      - name: Check nteract pi package tarball
        run: pnpm --dir plugins/nteract/pi pack:dry-run

  build:
    name: ${{ matrix.platform.name }}
    needs: [changes, build-ui]
    if: ${{ always() && (needs.changes.outputs.source_changed != 'true' || needs.build-ui.result == 'success') }}
    continue-on-error: ${{ matrix.platform.non_blocking }}
    runs-on: ${{ needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr) && matrix.platform.runner || 'blacksmith-4vcpu-ubuntu-2404' }}
    strategy:
      matrix:
        platform:
          - name: macOS
            runner: blacksmith-6vcpu-macos-15
            setup: echo "No extra deps needed on macOS"
            run_on_pr: false
            non_blocking: false
          - name: Windows
            runner: blacksmith-4vcpu-windows-2025
            setup: echo "No extra deps needed on Windows"
            run_on_pr: false
            non_blocking: true
    steps:
      - name: Skip non-source changes
        if: needs.changes.outputs.source_changed != 'true'
        run: echo "No source changes detected; skipping this platform leg."

      - name: Skip this platform on pull requests
        if: needs.changes.outputs.source_changed == 'true' && github.event_name == 'pull_request' && !matrix.platform.run_on_pr
        run: echo "Skipping this platform for pull_request events."

      - uses: actions/checkout@v6
        with:
          lfs: true
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)

      - name: Download UI build artifacts
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)
        uses: actions/download-artifact@v8
        with:
          name: ui-build-dist
          path: apps/notebook/dist

      - name: Install system dependencies
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)
        run: ${{ matrix.platform.setup }}

      - name: Install uv
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install rust
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)
        with:
          shared-key: ${{ matrix.platform.runner }}

      - name: Download WASM artifacts
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)
        uses: actions/download-artifact@v8
        with:
          name: wasm-artifacts

      - uses: ./.github/actions/build-runtime-artifacts
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)
        with:
          skip-wasm: true

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - run: pnpm --filter nteract-mcp-app install --frozen-lockfile && pnpm exec vp run nteract-mcp-app#build
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)

      - name: Build external binaries
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)
        shell: bash
        run: |
          cargo build --release -p runtimed -p runt -p nteract-mcp
          TARGET=$(rustc --print host-tuple)
          mkdir -p crates/notebook/binaries
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp target/release/runtimed.exe "crates/notebook/binaries/runtimed-$TARGET.exe"
            cp target/release/runt.exe "crates/notebook/binaries/runt-$TARGET.exe"
            cp target/release/nteract-mcp.exe "crates/notebook/binaries/nteract-mcp-$TARGET.exe"
          else
            cp target/release/runtimed "crates/notebook/binaries/runtimed-$TARGET"
            cp target/release/runt "crates/notebook/binaries/runt-$TARGET"
            cp target/release/nteract-mcp "crates/notebook/binaries/nteract-mcp-$TARGET"
          fi

      - name: Clippy
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)
        # runtimed-py is built/tested in the dedicated maturin/PyO3 job below.
        # Testing it as a plain workspace crate links the extension-module build
        # without Python symbols on macOS.
        run: cargo clippy --workspace --exclude runtimed-py --all-targets -- -D warnings

      - name: Build
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)
        run: cargo build --release

      - name: Run tests
        if: needs.changes.outputs.source_changed == 'true' && (github.event_name != 'pull_request' || matrix.platform.run_on_pr)
        run: cargo test --workspace --exclude runtimed-node --exclude runtimed-py --verbose

  # Native WebDriver E2E stays focused on Tauri shell behavior. Notebook UI,
  # runtime, and fixture coverage run in the faster Browser E2E (Playwright)
  # job above.
  e2e:
    name: "E2E: ${{ matrix.name }}"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes, build-linux]
    if: needs.changes.outputs.source_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Smoke
            spec: "e2e/specs/smoke.spec.js"
            notebook: ""
            uv_pool: 3
            conda_pool: 0
            timeout: 12
          - name: Untitled Pyproject
            spec: "e2e/specs/untitled-pyproject.spec.js"
            notebook: ""
            app_workdir: "crates/notebook/fixtures/audit-test/pyproject-project"
            uv_pool: 3
            conda_pool: 0
            timeout: 12
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            xvfb \
            webkit2gtk-driver

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Set pnpm store directory
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download E2E artifacts
        uses: actions/download-artifact@v8
        with:
          name: e2e-app-linux
          path: ./target/release

      - name: Make binaries executable
        run: |
          chmod +x target/release/notebook
          chmod +x target/release/binaries/*

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run E2E test
        timeout-minutes: ${{ matrix.timeout }}
        run: |
          set -o pipefail
          mkdir -p e2e-logs

          # Pre-seed settings to skip onboarding
          mkdir -p ~/.config/nteract-nightly
          echo '{"onboarding_completed": true}' > ~/.config/nteract-nightly/settings.json

          # Start Xvfb (headless display for WebKitGTK)
          Xvfb :99 -screen 0 1920x1080x24 2>/dev/null &
          export DISPLAY=:99
          sleep 2

          # Start daemon with pool configuration.
          # Unset UV_CACHE_DIR/UV_PYTHON_INSTALL_DIR so the daemon uses its own
          # env paths (runtimed-uv-*) instead of the CI uv action's temp cache.
          TARGET=$(find target/release/binaries -maxdepth 1 -name 'runtimed*' -print -quit)
          env -u UV_CACHE_DIR -u UV_PYTHON_INSTALL_DIR \
            RUNTIMED_WORKSPACE_PATH="${GITHUB_WORKSPACE}" \
            "$TARGET" --dev run \
            --uv-pool-size ${{ matrix.uv_pool }} --conda-pool-size ${{ matrix.conda_pool }} \
            > e2e-logs/daemon.log 2>&1 &
          DAEMON_PID=$!

          RUNT=$(find target/release/binaries -maxdepth 1 -name 'runt-*' -print -quit)
          if [ -z "$RUNT" ]; then
            echo "Could not find runt binary"
            exit 1
          fi

          wait_for_daemon() {
            local timeout="$1"
            for i in $(seq 1 "$timeout"); do
              kill -0 "$DAEMON_PID" 2>/dev/null || {
                echo "Daemon died while waiting for readiness"
                cat e2e-logs/daemon.log
                exit 1
              }

              STATUS=$(env -u UV_CACHE_DIR -u UV_PYTHON_INSTALL_DIR \
                RUNTIMED_WORKSPACE_PATH="${GITHUB_WORKSPACE}" \
                "$RUNT" daemon status --json 2>/dev/null || true)

              if [ -n "$STATUS" ] && STATUS_JSON="$STATUS" \
                UV_POOL="${{ matrix.uv_pool }}" \
                CONDA_POOL="${{ matrix.conda_pool }}" \
                python3 <<'PY'
          import json
          import os
          import sys

          status = json.loads(os.environ["STATUS_JSON"])
          if not status.get("running"):
              sys.exit(1)

          pool = status.get("pool_stats") or {}

          def ready(name, requested):
              if int(requested) <= 0:
                  return True
              state = pool.get(name) or {}
              return int(state.get("available") or 0) > 0

          sys.exit(
              0
              if ready("uv", os.environ["UV_POOL"])
              and ready("conda", os.environ["CONDA_POOL"])
              else 1
          )
          PY
              then
                echo "Daemon ready after ${i}s"
                echo "$STATUS"
                return 0
              fi

              sleep 1
            done

            echo "Daemon was not ready within ${timeout}s"
            echo "Last daemon status:"
            echo "${STATUS:-<none>}"
            echo "Daemon log:"
            cat e2e-logs/daemon.log
            exit 1
          }

          # Wait for daemon readiness and, when requested, at least one warm pool entry.
          if [ "${{ matrix.uv_pool }}" = "0" ] && [ "${{ matrix.conda_pool }}" = "0" ]; then
            wait_for_daemon 30
          else
            wait_for_daemon 120
          fi

          # Start the app (with notebook if specified)
          APP_WORKDIR="${{ matrix.app_workdir }}"
          APP_WORKDIR="${APP_WORKDIR:-.}"
          if [ -n "${{ matrix.notebook }}" ]; then
            (
              cd "${APP_WORKDIR}"
              env -u UV_CACHE_DIR -u UV_PYTHON_INSTALL_DIR \
                RUNTIMED_WORKSPACE_PATH="${GITHUB_WORKSPACE}" \
                RUST_LOG=info,notebook=debug \
                "${GITHUB_WORKSPACE}/target/release/notebook" \
                  "${GITHUB_WORKSPACE}/${{ matrix.notebook }}"
            ) > e2e-logs/app.log 2>&1 &
          else
            (
              cd "${APP_WORKDIR}"
              env -u UV_CACHE_DIR -u UV_PYTHON_INSTALL_DIR \
                RUNTIMED_WORKSPACE_PATH="${GITHUB_WORKSPACE}" \
                RUST_LOG=info,notebook=debug \
                "${GITHUB_WORKSPACE}/target/release/notebook"
            ) > e2e-logs/app.log 2>&1 &
          fi
          APP_PID=$!

          # Wait for WebDriver server
          for _ in $(seq 1 60); do
            curl -s http://localhost:4445/status >/dev/null 2>&1 && break
            kill -0 "$APP_PID" 2>/dev/null || { echo "App died"; cat e2e-logs/app.log; exit 1; }
            sleep 1
          done
          echo "WebDriver ready"

          # Run tests
          if [ -n "${{ matrix.spec }}" ]; then
            WEBDRIVER_PORT=4445 E2E_SPEC="${{ matrix.spec }}" \
              pnpm test:e2e 2>&1 | tee e2e-logs/test-output.log
          else
            WEBDRIVER_PORT=4445 pnpm test:e2e 2>&1 | tee e2e-logs/test-output.log
          fi
          EXIT=$?

          # Cleanup
          kill $APP_PID $DAEMON_PID 2>/dev/null || true
          exit $EXIT
        env:
          NO_AT_BRIDGE: 1
          LIBGL_ALWAYS_SOFTWARE: 1
          WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS: 1
          WEBKIT_DISABLE_COMPOSITING_MODE: 1

      - name: Collect daemon logs
        if: always()
        run: |
          mkdir -p e2e-logs
          # Find and copy daemon logs from worktree cache
          find ~/.cache/runt/worktrees -name "runtimed.log" -exec cp {} e2e-logs/ \; 2>/dev/null || true
          find ~/.cache/runt/worktrees -name "daemon.json" -exec cp {} e2e-logs/ \; 2>/dev/null || true
          # Also capture any app logs
          ls -la ~/.cache/runt/worktrees/*/  2>/dev/null || true
          echo "=== Daemon log ===" && cat e2e-logs/runtimed.log 2>/dev/null || echo "No daemon log found"

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-screenshots-${{ matrix.name }}
          path: e2e-screenshots/failures/
          retention-days: 7

      - name: Upload daemon logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs-${{ matrix.name }}
          path: e2e-logs/
          retention-days: 7

  # Python daemon integration tests — builds its own runtimed binary
  runtimed-py-integration:
    name: runtimed-py Integration Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [changes]
    if: needs.changes.outputs.source_changed == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-py-integration

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          run-install: false

      # Build wasm + renderer plugins (gitignored; runtimed embeds them)
      - uses: ./.github/actions/build-runtime-artifacts

      - name: Build runtimed binary
        run: cargo build --release -p runtimed

      - name: Build runtimed-py into the workspace venv
        # Sync only the Python packages exercised by these tests. The root
        # workspace dev group includes agent/model tooling that is irrelevant
        # here and can fail resolution on Linux when upstream extras churn.
        # VIRTUAL_ENV plus `uv run --active` pins maturin to this same .venv
        # so the bindings land where pytest will look.
        run: |
          uv sync --no-default-groups \
            --package runtimed \
            --package dx \
            --package nteract \
            --package nteract-kernel-launcher \
            --group dev
          cd crates/runtimed-py && \
            VIRTUAL_ENV="${GITHUB_WORKSPACE}/.venv" \
            uv run --active --directory ../../python/runtimed maturin develop

      - name: Run runtimed-py Rust unit tests
        run: |
          PYTHON="${GITHUB_WORKSPACE}/.venv/bin/python"
          PYTHON_LIB_DIR="$("${PYTHON}" - <<'PY'
          import sysconfig
          print(sysconfig.get_config_var("LIBDIR") or "")
          PY
          )"
          export PYO3_PYTHON="${PYTHON}"
          export LD_LIBRARY_PATH="${PYTHON_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="${PYTHON_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          cargo test -p runtimed-py --lib --no-default-features --verbose

      - name: Run integration tests
        timeout-minutes: 30
        working-directory: python/runtimed
        run: |
          set -o pipefail
          mkdir -p integration-logs

          # Set environment for CI mode
          export RUNTIMED_INTEGRATION_TEST=1
          export RUNTIMED_BINARY="${GITHUB_WORKSPACE}/target/release/runtimed"
          export RUNTIMED_LOG_LEVEL=debug
          export RUNTIMED_WORKSPACE_PATH="${GITHUB_WORKSPACE}"
          export RUNTIMED_TEST_UV_POOL_SIZE=1
          export RUNTIMED_TEST_CONDA_POOL_SIZE=0
          # Tells the test fixture to copy daemon.log into the artifact
          # dir on teardown so a post-mortem has the daemon's side of any
          # failure (see #2290).
          export RUNTIMED_INTEGRATION_LOG_DIR="${GITHUB_WORKSPACE}/python/runtimed/integration-logs"

          # Pin uv to the workspace venv so dx + pandas + pyarrow + polars
          # are importable for test_dx_integration. The cwd stays at
          # python/runtimed so `tool.pytest.ini_options` from this
          # subproject's pyproject.toml applies (asyncio_mode = "auto",
          # timeout = 600). uv-installed bindings landed in
          # ${GITHUB_WORKSPACE}/.venv via VIRTUAL_ENV in the previous step.
          export VIRTUAL_ENV="${GITHUB_WORKSPACE}/.venv"
          export RUNTIMED_PYTEST_WORKERS=6
          uv run pytest \
            tests/test_daemon_integration.py \
            tests/test_dx_integration.py \
            -n "${RUNTIMED_PYTEST_WORKERS}" \
            --dist loadscope \
            --durations=25 \
            -v --tb=short 2>&1 | tee integration-logs/test-output.log || FAIL=1

          exit "${FAIL:-0}"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtimed-py-integration-logs
          path: python/runtimed/integration-logs/
          retention-days: 7

  python-unit-tests:
    # Unit-level pytest coverage for the Python packages: runtimed (bindings),
    # dx (formatter + refs), prewarm (pool), nteract (MCP smoke). These do not
    # need a live daemon; the integration half is handled by
    # `runtimed-py-integration` above. Lint/format/type-check is already
    # covered by the Lint & Format job (`cargo xtask lint`), so this job
    # runs pytest only.
    name: Python Unit Tests
    needs: [changes]
    if: needs.changes.outputs.source_changed == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: python-x86_64-unknown-linux-gnu

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        run: uv python install 3.12

      # Build wasm + renderer plugins (gitignored; runtimed embeds them)
      - uses: ./.github/actions/build-runtime-artifacts

      - name: Build and stage runtimed binary
        run: |
          cargo build -p runtimed
          cp target/debug/runtimed python/runtimed/src/runtimed/_bin/

      - name: Sync workspace
        run: |
          uv sync --no-default-groups \
            --package runtimed \
            --package dx \
            --package prewarm \
            --package nteract \
            --package nteract-kernel-launcher \
            --group dev

      - name: Run runtimed-py unit tests
        working-directory: python/runtimed
        run: uv run --no-sync pytest tests/test_session_unit.py tests/test_binary.py tests/test_ipython_bridge.py -v --tb=short

      - name: Run dx unit tests
        run: uv run --no-sync pytest python/dx/tests/ -v --tb=short

      - name: Run nteract-kernel-launcher unit tests
        run: uv run --no-sync pytest python/nteract-kernel-launcher/tests/ -v --tb=short

      - name: Install and run prewarm unit tests
        run: |
          uv pip install -e python/prewarm
          uv run --no-sync pytest python/prewarm/tests/ -v --tb=short

      - name: Run nteract smoke tests
        working-directory: python/nteract
        run: uv run --no-sync pytest -v
