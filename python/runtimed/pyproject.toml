[project]
name = "runtimed"
version = "2.6.0"
description = "Python toolkit for Jupyter runtimes, powered by runtimed Rust binaries"
readme = "README.md"
license = "BSD-3-Clause"
authors = [
    { name = "Kyle Kelley", email = "rgbkrk@gmail.com" }
]
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
kernel = ["ipykernel>=6.0"]
bridge = ["pyzmq>=25.0"]

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[tool.maturin]
manifest-path = "../../crates/runtimed-py/Cargo.toml"
module-name = "runtimed._internals"
python-source = "src"
bindings = "pyo3"

[dependency-groups]
dev = [
    "maturin>=1.0,<2.0",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-timeout>=2.0",
    "pytest-xdist>=3.6",
    "ipykernel>=6.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "module"
# Global timeout catches truly stuck tests. Must be high enough
# to cover the daemon_process fixture startup (up to 150s for socket +
# pool warmup on first test in the module) and survive at least one
# 300s LaunchKernel wire timeout with room for retries.
timeout = 600
